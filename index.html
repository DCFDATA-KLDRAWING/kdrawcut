<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KDrawCUT - 手機版科技感影片編輯器</title>

  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM (透過 UMD，為了純 HTML 執行穩定度) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 進行瀏覽器內編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Lucide 圖示庫 (透過 UMD) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    html, body { 
      width: 100%; 
      height: 100%; 
      margin: 0; 
      padding: 0; 
      background-color: #020617; 
      overflow: hidden; 
      overscroll-behavior: none; 
      -webkit-tap-highlight-color: transparent;
    }
    #root { width: 100%; height: 100%; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    @keyframes kdrawcut-spin { 100% { transform: rotate(360deg); } }
  </style>

</head>
<body>
  <div id="root">
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#22d3ee; font-family:sans-serif; background-color:#020617;">
      <div style="width:50px; height:50px; border:4px solid #0891b2; border-top-color:#22d3ee; border-radius:50%; animation:kdrawcut-spin 1s linear infinite; margin-bottom:20px;"></div>
      <h3 style="letter-spacing: 2px; font-weight: bold;">啟動 KDrawCUT 引擎...</h3>
      <p style="color:#64748b; font-size:12px; margin-top:10px;">首次載入可能需要幾秒鐘</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- 圖示元件模擬 (因為 Lucide UMD 無法直接做為 React 元件解構) ---
    // 這裡我們用簡單的 SVG 或是文字來暫時替代，以確保預覽不會因為 Icon 找不到而崩潰
    const Icon = ({ name, size = 20, className = "" }) => {
        const iconMap = {
            Upload: "📤", Play: "▶️", Pause: "⏸️", Download: "💾", Plus: "+", 
            Trash2: "🗑️", Type: "T", Scissors: "✂️", Undo2: "↩️", Redo2: "↪️", 
            SmilePlus: "🙂", LayoutTemplate: "📰", Palette: "🎨", Save: "💾", 
            ArrowLeft: "⬅️", ImageIcon: "🖼️", LinkIcon: "🔗", Home: "🏠", 
            Zap: "⚡", ListChecks: "📝"
        };
        return <span className={className} style={{fontSize: size}}>{iconMap[name] || "🔘"}</span>;
    };

    // 🌟 動態載入字型
    const loadFonts = () => {
      if (!document.getElementById('kdrawcut-fonts')) {
        const link = document.createElement('link');
        link.id = 'kdrawcut-fonts';
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Bangers&family=Dela+Gothic+One&family=Noto+Sans+TC:wght@400;900&family=Noto+Serif+TC:wght@600;900&family=Orbitron:wght@900&family=Mochiy+Pop+One&family=Potta+One&family=Zen+Maru+Gothic:wght@900&display=swap';
        document.head.appendChild(link);
      }
    };

    // 🌟 簡易簡繁轉換字典
    const simplifiedToTraditional = (text) => {
        const mapping = {
            '说':'說','这':'這','对':'對','会':'會','发':'發','机':'機','个':'個','来':'來','过':'過','们':'們',
            '样':'樣','里':'裡','没':'沒','现':'現','么':'麼','为':'為','觉':'覺','点':'點','开':'開','当':'當',
            '听':'聽','还':'還','让':'讓','给':'給','进':'進','动':'動','网':'網','认':'認','图':'圖','实':'實',
            '边':'邊','买':'買','书':'書','车':'車','吗':'嗎','从':'從','后':'後','着':'著','问':'問','题':'題',
            '关':'關','系':'係','变':'變','长':'長','两':'兩','见':'見','视':'視','频':'頻','线':'線','剪':'剪',
            '爱':'愛','备':'備','笔':'筆','仓':'倉','产':'產','冲':'衝','虫':'蟲','丑':'醜','处':'處','辞':'辭',
            '达':'達','带':'帶','单':'單','担':'擔','胆':'膽','导':'導','灯':'燈','敌':'敵','递':'遞','电':'電',
            '垫':'墊','东':'東','冻':'凍','独':'獨','断':'斷','队':'隊','恶':'惡','丰':'豐','风':'風','凤':'鳳',
            '妇':'婦','盖':'蓋','干':'幹','赶':'趕','观':'觀','广':'廣','归':'歸','龟':'龜','国':'國','华':'華',
            '欢':'歡','环':'環','换':'換','挥':'揮','辉':'輝','汇':'匯','几':'幾','鸡':'雞','极':'極','际':'際',
            '继':'繼','记':'記','夹':'夾','价':'價','艰':'艱','简':'簡','坚':'堅','减':'減','渐':'漸','剑':'劍',

            '灭':'滅','悯':'憫','鸣':'鳴','铭':'銘','谬':'謬','谋':'謀','难':'難','脑':'腦','鸟':'鳥','宁':'寧',

            '亲':'親','庆':'慶','穷':'窮','劝':'勸','权':'權','确':'確','荣':'榮','锐':'銳','润':'潤','伞':'傘',
            '伤':'傷','赏':'賞','摄':'攝','审':'審','胜':'勝','湿':'濕','势':'勢','试':'試','寿':'壽','枢':'樞',
            '术':'術','属':'屬','双':'雙','顺':'順','耸':'聳','苏':'蘇','诉':'訴','虽':'雖','随':'隨','孙':'孫',
            '缩':'縮','态':'態','叹':'嘆','腾':'騰','体':'體','条':'條','铁':'鐵','厅':'廳','头':'頭','团':'團',
            '万':'萬','伟':'偉','伪':'偽','维':'維','卫':'衛','温':'溫','闻':'聞','稳':'穩','乌':'烏','无':'無',
            '戏':'戲','吓':'嚇','险':'險','显':'顯','献':'獻','县':'縣','乡':'鄉','详':'詳','响':'響','项':'項',
            '销':'銷','写':'寫','胁':'脅','泻':'瀉','谢':'謝','兴':'興','汹':'洶','须':'須','虚':'虛','许':'許',
            '压':'壓','亚':'亞','严':'嚴','盐':'鹽','颜':'顏','艳':'艷','厌':'厭','扬':'揚','阳':'陽','杨':'楊',
            '药':'藥','爷':'爺','页':'頁','业':'業','叶':'葉','医':'醫','异':'異','义':'義','仪':'儀','艺':'藝',
            '亿':'億','忆':'憶','隐':'隱','阴':'陰','银':'銀','饮':'飲','樱':'櫻','婴':'嬰','鹰':'鷹','应':'應',
            '拥':'擁','佣':'傭','涌':'湧','游':'遊','诱':'誘','与':'與','屿':'嶼','语':'語','誉':'譽','预':'預',
            '渊':'淵','远':'遠','园':'園','圆':'圓','愿':'願','跃':'躍','粤':'粵','云':'雲','匀':'勻','杂':'雜',
            '灾':'災','载':'載','赞':'贊','脏':'髒','凿':'鑿','枣':'棗','责':'責','择':'擇','则':'則','泽':'澤',
            '贼':'賊','增':'增','赠':'贈','扎':'紮','轧':'軋','闸':'閘','诈':'詐','斋':'齋','债':'債','毡':'氈',
            '占':'佔','战':'戰','张':'張','涨':'漲','帐':'帳','账':'賬','赵':'趙','哲':'哲','辄':'輒','诊':'診',
            '阵':'陣','挣':'掙','睁':'睜','证':'證','郑':'鄭','帧':'幀','症':'症','织':'織','执':'執','侄':'姪',
            '职':'職','纸':'紙','挚':'摯','掷':'擲','帜':'幟','质':'質','钟':'鐘','终':'終','种':'種','肿':'腫',
            '众':'眾','皱':'皺','昼':'晝','骤':'驟','猪':'豬','诸':'諸','诛':'誅','烛':'燭','瞩':'矚','筑':'築',
            '铸':'鑄','专':'專','砖':'磚','转':'轉','赚':'賺','桩':'樁','庄':'莊','装':'裝','妆':'妝','壮':'壯',
            '状':'狀','追':'追','坠':'墜','缀':'綴','谆':'諄','浊':'濁','兹':'茲','资':'資','渍':'漬','踪':'蹤',
            '综':'綜','总':'總','纵':'縱','邹':'鄒','钻':'鑽'
        };
        let result = '';
        for(let i=0; i<text.length; i++) {
            result += mapping[text[i]] || text[i];
        }
        return result;
    };

    // ================== 🌟 批量字幕精修工作站 ==================
    function SubtitleStudio({ overlays, setOverlays, onBack, saveHistory }) {
      const [localTexts, setLocalTexts] = useState(
         overlays.filter(o => o.type === 'text').sort((a, b) => a.startTime - b.startTime)
      );

      // 🌟 新增：批次替換的狀態
      const [findWord, setFindWord] = useState('');
      const [replaceWord, setReplaceWord] = useState('');
      const [replaceMsg, setReplaceMsg] = useState('');

      // 🌟 新增：執行全部替換的邏輯
      const handleBatchReplace = () => {
         if (!findWord) return;
         let count = 0;
         setLocalTexts(prev => prev.map(t => {
            if (t.content.includes(findWord)) {
               count += (t.content.match(new RegExp(findWord, 'g')) || []).length;
               // 使用 split().join() 來替換該字串裡所有的目標字詞
               return { ...t, content: t.content.split(findWord).join(replaceWord) };
            }
            return t;
         }));
         
         if (count > 0) {
            setReplaceMsg(`✅ 成功替換了 ${count} 個 "${findWord}"`);
         } else {
            setReplaceMsg(`⚠️ 找不到 "${findWord}"`);
         }
         setTimeout(() => setReplaceMsg(''), 3000);
      };
      
      const handleChange = (id, field, value) => {
         setLocalTexts(prev => prev.map(t => {
            if (t.id === id) {
               if (field === 'startTime' || field === 'endTime') {
                   let numVal = parseFloat(value) || 0;
                   return { ...t, [field]: numVal };
               }
               return { ...t, [field]: value };
            }
            return t;
         }));
      };

      const handleSave = () => {
         const newOverlays = overlays.map(o => {
            const updated = localTexts.find(lt => lt.id === o.id);
            return updated ? updated : o;
         });
         setOverlays(newOverlays);
         saveHistory(undefined, newOverlays); 
         onBack();
      };

      return (
        <div className="absolute inset-0 z-50 bg-slate-950 flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-300 overflow-hidden font-sans">
          <header className="flex justify-between items-center p-4 bg-slate-900 border-b border-yellow-900/50 shrink-0 shadow-md z-10">
            <button onClick={onBack} className="flex items-center gap-1 text-slate-400 hover:text-yellow-400 transition">
              <Icon name="ArrowLeft" size={20} /> <span className="font-bold">取消</span>
            </button>
            <div className="font-bold text-yellow-400 tracking-wider flex items-center gap-2"><Icon name="ListChecks" size={18}/> 批量精修字幕</div>
            <button onClick={handleSave} className="flex items-center gap-1 bg-yellow-600 hover:bg-yellow-500 text-slate-900 px-4 py-1.5 rounded-full font-bold transition shadow-[0_0_15px_rgba(202,138,4,0.5)]">
              <Icon name="Save" size={16} /> 完成
            </button>
          </header>

          {/* 🌟 新增部分 3：批次尋找與替換工具列 UI */}
          <div className="bg-slate-900 border-b border-slate-800 p-3 shrink-0 flex flex-col gap-2 shadow-inner">
             <div className="flex items-center gap-2">
                <Icon name="Scissors" size={16} className="text-slate-500" />
                <input type="text" value={findWord} onChange={e=>setFindWord(e.target.value)} placeholder="尋找錯字..." className="w-24 flex-1 bg-slate-950 border border-slate-700 rounded px-2 py-1.5 text-sm text-white focus:border-yellow-400 focus:outline-none" />
                <span className="text-xs text-slate-500">➔</span>
                <input type="text" value={replaceWord} onChange={e=>setReplaceWord(e.target.value)} placeholder="替換為正確詞..." className="w-24 flex-1 bg-slate-950 border border-slate-700 rounded px-2 py-1.5 text-sm text-white focus:border-yellow-400 focus:outline-none" />
                <button onClick={handleBatchReplace} className="bg-yellow-900/40 text-yellow-400 hover:bg-yellow-500 hover:text-slate-900 border border-yellow-500/50 px-3 py-1.5 rounded text-sm font-bold transition whitespace-nowrap">全部替換</button>
             </div>
             {replaceMsg && <div className="text-xs text-green-400 font-bold ml-6 animate-pulse">{replaceMsg}</div>}
          </div>

          <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
             {localTexts.length === 0 ? (
                <div className="text-center text-slate-500 mt-20">您目前還沒有添加任何字幕喔！</div>
             ) : (
                <div className="text-xs text-yellow-500/70 text-center mb-4">💡 提示：可以在此快速修改所有 AI 辨識錯的錯別字與時間</div>
             )}
             
             {localTexts.map((txt, index) => (
                <div key={txt.id} className="bg-slate-900 border border-slate-700 rounded-xl p-3 shadow-inner flex flex-col gap-2">
                   <div className="flex justify-between items-center text-[10px] text-slate-400">
                      <span className="font-bold text-slate-500">片段 {index + 1}</span>
                      <div className="flex items-center gap-1">
                         <span>開始:</span>
                         <input type="number" step="0.1" value={txt.startTime} onChange={(e) => handleChange(txt.id, 'startTime', e.target.value)} className="w-14 bg-slate-950 border border-slate-700 rounded px-1 py-0.5 text-center focus:border-yellow-400 focus:outline-none text-cyan-300" />
                         <span className="ml-2">結束:</span>
                         <input type="number" step="0.1" value={txt.endTime} onChange={(e) => handleChange(txt.id, 'endTime', e.target.value)} className="w-14 bg-slate-950 border border-slate-700 rounded px-1 py-0.5 text-center focus:border-yellow-400 focus:outline-none text-cyan-300" />
                         <span>秒</span>
                      </div>
                   </div>
                   <textarea 
                      value={txt.content} 
                      onChange={(e) => handleChange(txt.id, 'content', e.target.value)}
                      className="w-full bg-slate-950 text-white font-bold border border-slate-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400 transition resize-y min-h-[60px]" 
                      placeholder="輸入字幕內容..."
                   />
                </div>
             ))}
          </div>
        </div>
      );
    }

    // ================== 🌟 終極模版實驗室 ==================
    function TemplateLab({ onBack, customTemplates, setCustomTemplates, showToastMessage }) {
      const [labMode, setLabMode] = useState('text'); 

      const [tpl, setTpl] = useState({
        name: '我的專屬字體',
        fontFamily: '"Noto Sans TC", sans-serif',
        color: '#FFFFFF',
        useGradient: false,
        gradientColor2: '#00F0FF',
        strokeColor: '#000000',
        strokeWidth: 4,
        strokeColor2: '#FFFFFF', 
        strokeWidth2: 0,
        boxStyle: 'none', 
        boxColor: 'rgba(15, 23, 42, 0.8)',
        icon: 'none', 
        shadow: true,
        dynamicGlow: false,
        dynamicSparkles: false,
        dynamicGlitch: false, 
        dynamicFloat: false,  
        dynamicShake: false,  
        dynamicSweep: false,  
      });

      const [transTpl, setTransTpl] = useState({
        name: '我的自訂轉場',
        transStyle: 'flash', 
        color: '#FFFFFF',
        intensity: 80
      });

      const previewCanvasRef = useRef(null);
      const animationRef = useRef(null);

      const renderPreview = (time) => {
        if (!previewCanvasRef.current) return;
        const ctx = previewCanvasRef.current.getContext('2d');
        const canvas = previewCanvasRef.current;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const timeSec = time / 1000;

        if (labMode === 'transition') {
            const cycle = timeSec % 2; 
            const isSceneB = cycle >= 1.0; 
            ctx.fillStyle = isSceneB ? '#8b5cf6' : '#0ea5e9'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = '900 60px "Noto Sans TC", sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(isSceneB ? '🎥 影片片段 B' : '🎬 影片片段 A', canvas.width/2, canvas.height/2);

            const dist = Math.abs(cycle - 1.0);
            if (dist < 0.4) {
                const intensityMult = 1 - (dist / 0.4);
                const intensityVal = transTpl.intensity / 100;
                
                if (transTpl.transStyle === 'flash') {
                    ctx.globalAlpha = intensityMult * intensityVal;
                    ctx.fillStyle = transTpl.color;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.globalAlpha = 1.0;
                } 
                else if (transTpl.transStyle === 'glitch') {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                    tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
                    
                    ctx.clearRect(0,0,canvas.width, canvas.height);
                    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
                    
                    const numSlices = 15;
                    const maxOffset = intensityMult * intensityVal * 150;
                    for(let i=0; i<numSlices; i++) {
                        const sy = (i/numSlices) * canvas.height;
                        const sh = canvas.height / numSlices;
                        const dx = (Math.random() - 0.5) * 2 * maxOffset;
                        ctx.drawImage(tempCanvas, 0, sy, canvas.width, sh, dx, sy, canvas.width, sh);
                    }
                }
                else if (transTpl.transStyle === 'pixelate') {
                    const bs = Math.floor(1 + intensityMult * intensityVal * 40);
                    if (bs > 1) {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                        tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
                        ctx.imageSmoothingEnabled = false;
                        ctx.drawImage(tempCanvas, 0, 0, canvas.width/bs, canvas.height/bs);
                        ctx.drawImage(canvas, 0, 0, canvas.width/bs, canvas.height/bs, 0, 0, canvas.width, canvas.height);
                        ctx.imageSmoothingEnabled = true;
                    }
                }
                else if (transTpl.transStyle === 'rgb_split') {
                    const offset = intensityMult * intensityVal * 60;
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                    tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
                    
                    ctx.globalCompositeOperation = 'screen';
                    ctx.globalAlpha = 0.5;
                    ctx.drawImage(tempCanvas, offset, 0);
                    ctx.drawImage(tempCanvas, -offset, 0);
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 1.0;
                }
            }
        } 
        else {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<canvas.width; i+=20) {
               ctx.fillStyle = 'rgba(255,255,255,0.02)';
               ctx.fillRect(i, 0, 1, canvas.height);
               ctx.fillRect(0, i, canvas.width, 1);
            }

            const currentSize = 45;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            let displayText = '訂閱 KDrawCUT';
            if (tpl.icon === 'bell') displayText = '🔔 ' + displayText;
            if (tpl.icon === 'like') displayText = '👍 ' + displayText;
            if (tpl.icon === 'star') displayText = '⭐ ' + displayText;

            ctx.save();

            let floatOffsetY = 0;
            let shakeOffsetX = 0;
            let shakeOffsetY = 0;
            if (tpl.dynamicFloat) floatOffsetY = Math.sin(timeSec * 3) * (currentSize * 0.15);
            if (tpl.dynamicShake) {
                shakeOffsetX = (Math.random() - 0.5) * (currentSize * 0.15);
                shakeOffsetY = (Math.random() - 0.5) * (currentSize * 0.15);
            }

            ctx.translate(centerX + shakeOffsetX, centerY + floatOffsetY + shakeOffsetY);
            
            ctx.font = `900 ${currentSize}px ${tpl.fontFamily}`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            const textWidth = ctx.measureText(displayText).width;
            const paddingX = currentSize * 0.8;
            const paddingY = currentSize * 0.5;
            const bw = textWidth + paddingX * 2;
            const bh = currentSize + paddingY * 2;

            if (tpl.boxStyle !== 'none') {
               ctx.fillStyle = tpl.boxColor;
               ctx.beginPath();
               if (tpl.boxStyle === 'cyber') {
                  ctx.moveTo(-bw/2 + 10, -bh/2); ctx.lineTo(bw/2, -bh/2); ctx.lineTo(bw/2 - 10, bh/2); ctx.lineTo(-bw/2, bh/2); ctx.fill();
               } else if (tpl.boxStyle === 'pill') {
                  if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, currentSize); else ctx.fillRect(-bw/2, -bh/2, bw, bh); ctx.fill();
               } else if (tpl.boxStyle === 'bubble') {
                  if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, 15); else ctx.fillRect(-bw/2, -bh/2, bw, bh); ctx.fill();
                  ctx.beginPath(); ctx.moveTo(-10, bh/2); ctx.lineTo(10, bh/2); ctx.lineTo(0, bh/2 + 15); ctx.fill();
               } else if (tpl.boxStyle === 'glass') {
                  ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                  if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, 20); else ctx.fillRect(-bw/2, -bh/2, bw, bh); ctx.fill(); ctx.stroke();
               } else if (tpl.boxStyle === 'ribbon') {
                  ctx.moveTo(-bw/2, -bh/2); ctx.lineTo(bw/2, -bh/2); ctx.lineTo(bw/2 - 20, 0); ctx.lineTo(bw/2, bh/2); ctx.lineTo(-bw/2, bh/2); ctx.lineTo(-bw/2 + 20, 0); ctx.fill();
               } else if (tpl.boxStyle === 'tape') {
                  ctx.save(); ctx.rotate(-2 * Math.PI / 180); ctx.fillStyle = tpl.boxColor || 'rgba(255, 250, 200, 0.85)'; ctx.fillRect(-bw/2 - 10, -bh/2, bw + 20, bh); ctx.restore();
               } else if (tpl.boxStyle === 'neon') {
                  ctx.shadowBlur = 15; ctx.shadowColor = tpl.boxColor; ctx.strokeStyle = tpl.boxColor; ctx.lineWidth = 3; ctx.strokeRect(-bw/2, -bh/2, bw, bh); ctx.shadowBlur = 0;
               }
            }

            if (tpl.shadow) { 
                let blurAmount = 15;
                if (tpl.dynamicGlow) blurAmount = 15 + Math.sin(timeSec * 5) * 10; 
                ctx.shadowColor = tpl.color; ctx.shadowBlur = blurAmount; 
            } else { ctx.shadowBlur = 0; }

            if (tpl.strokeWidth2 > 0) { ctx.lineWidth = tpl.strokeWidth + tpl.strokeWidth2 * 2; ctx.strokeStyle = tpl.strokeColor2; ctx.lineJoin = 'round'; ctx.strokeText(displayText, 0, 0); }
            if (tpl.strokeWidth > 0) { ctx.lineWidth = tpl.strokeWidth; ctx.strokeStyle = tpl.strokeColor; ctx.lineJoin = 'round'; ctx.strokeText(displayText, 0, 0); }

            if (tpl.dynamicSweep) {
                const sweepPos = (timeSec * 1.5) % 2.5 - 0.5; 
                const grad = ctx.createLinearGradient(-bw/2, 0, bw/2, 0);
                grad.addColorStop(0, tpl.color);
                grad.addColorStop(Math.max(0, Math.min(1, sweepPos - 0.1)), tpl.color);
                grad.addColorStop(Math.max(0, Math.min(1, sweepPos)), '#FFFFFF');
                grad.addColorStop(Math.max(0, Math.min(1, sweepPos + 0.1)), tpl.gradientColor2 || tpl.color);
                grad.addColorStop(1, tpl.gradientColor2 || tpl.color);
                ctx.fillStyle = grad;
            } else if (tpl.useGradient) {
                const gradient = ctx.createLinearGradient(0, -currentSize/2, 0, currentSize/2);
                gradient.addColorStop(0, tpl.color); gradient.addColorStop(1, tpl.gradientColor2); ctx.fillStyle = gradient;
            } else {
                ctx.fillStyle = tpl.color;
            }
            
            if (tpl.dynamicGlitch && Math.random() > 0.8) {
                const glitchOffset = (Math.random() - 0.5) * currentSize * 0.3;
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = '#FF003C'; ctx.fillText(displayText, glitchOffset, 0);
                ctx.fillStyle = '#00F0FF'; ctx.fillText(displayText, -glitchOffset, 0);
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#FFFFFF'; 
            }

            ctx.fillText(displayText, 0, 0);

            if (tpl.dynamicSparkles) {
               const numSparkles = 5;
               ctx.fillStyle = '#FFFFFF';
               for (let i = 0; i < numSparkles; i++) {
                  const offsetX = Math.cos(timeSec * 2 + i) * (textWidth * 0.6);
                  const offsetY = Math.sin(timeSec * 3 + i * 2) * (currentSize * 0.8);
                  const scale = Math.max(0, Math.sin(timeSec * 4 + i));
                  if (scale > 0.1) {
                      ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
                      ctx.shadowColor = '#FFFFFF'; ctx.shadowBlur = 10;
                      ctx.beginPath(); ctx.moveTo(0, -10); ctx.quadraticCurveTo(2, -2, 10, 0); ctx.quadraticCurveTo(2, 2, 0, 10); ctx.quadraticCurveTo(-2, 2, -10, 0); ctx.quadraticCurveTo(-2, -2, 0, -10); ctx.fill();
                      ctx.restore();
                  }
               }
            }
            ctx.restore();
        }
        
        animationRef.current = requestAnimationFrame(renderPreview);
      };

      const [isRecognizing, setIsRecognizing] = useState(false); 

      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const animationRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const recordedChunksRef = useRef([]);

      const showToastMessage = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      useEffect(() => {
        loadFonts(); 
        const draft = localStorage.getItem('kdrawcut_draft');
        if (draft) setHasDraft(true);
        const storedTpls = localStorage.getItem('kdrawcut_custom_templates');
        if (storedTpls) setCustomTemplates(JSON.parse(storedTpls));
      }, []);

      useEffect(() => {
        if (videoUrl && duration > 0) {
          if (segments.length > 1 || overlays.length > 0 || globalEffects.length > 0 || segments[0]?.isDeleted) {
            const draftData = { segments, overlays, globalEffects, duration };
            localStorage.setItem('kdrawcut_draft', JSON.stringify(draftData));
          }
        }
      }, [segments, overlays, globalEffects, videoUrl, duration]);

      const clearDraft = () => {
        localStorage.removeItem('kdrawcut_draft');
        setHasDraft(false);
        showToastMessage('已清除前次草稿，準備開啟新專案');
      };

      const handleGoHome = () => {
        const hasEdited = segments.length > 1 || overlays.length > 0 || globalEffects.length > 0 || segments.some(s => s.isDeleted);
        if (hasEdited) {
          if (window.confirm('確定要回到首頁嗎？您目前的編輯進度已經自動儲存為草稿。')) {
            resetToHome();
          }
        } else {
          resetToHome();
        }
      };

      const resetToHome = () => {
        if (videoRef.current) videoRef.current.pause();
        setIsPlaying(false); setVideoUrl(''); setCurrentTime(0); setDuration(0);
        setSegments([]); setOverlays([]); setGlobalEffects([]);
        setSelectedSegmentId(null); setSelectedOverlayId(null); setSelectedEffectId(null);
        setHistory([]); setHistoryPointer(-1);
      };

      const saveHistory = useCallback((newSegments = segments, newOverlays = overlays, newEffects = globalEffects) => {
        const safeOverlays = newOverlays.map(o => ({...o, imgElement: null}));
        const newState = { 
          segments: JSON.parse(JSON.stringify(newSegments)), 
          overlays: safeOverlays,
          globalEffects: JSON.parse(JSON.stringify(newEffects))
        };
        newState.overlays.forEach((o, i) => { o.imgElement = newOverlays[i].imgElement; });

        setHistory(prev => {
          const newHistory = prev.slice(0, historyPointer + 1);
          newHistory.push(newState);
          return newHistory;
        });
        setHistoryPointer(prev => prev + 1);
      }, [historyPointer, segments, overlays, globalEffects]);

      const handleUndo = () => {
        if (historyPointer > 0) {
          const prevState = history[historyPointer - 1];
          setSegments(prevState.segments); setOverlays(prevState.overlays); setGlobalEffects(prevState.globalEffects || []);
          setHistoryPointer(historyPointer - 1); setSelectedSegmentId(null); setSelectedOverlayId(null); setSelectedEffectId(null);
        }
      };

      const handleRedo = () => {
        if (historyPointer < history.length - 1) {
          const nextState = history[historyPointer + 1];
          setSegments(nextState.segments); setOverlays(nextState.overlays); setGlobalEffects(nextState.globalEffects || []);
          setHistoryPointer(historyPointer + 1); setSelectedSegmentId(null); setSelectedOverlayId(null); setSelectedEffectId(null);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          setVideoUrl(url); setCurrentTime(0); setHistory([]); setHistoryPointer(-1); setSelectedSegmentId(null); setSelectedOverlayId(null); setSelectedEffectId(null);
          setIsVideoVertical(false); 
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.src = url;
          img.onload = () => {
            const currentActual = videoRef.current ? videoRef.current.currentTime : 0;
            const currentConceptual = getConceptualTime(currentActual);
            const endConceptual = Math.min(currentConceptual + 3, validDuration);
            const newOverlays = [
              ...overlays,
              { id: Date.now(), type: 'image', content: url, imgElement: img, startTime: currentActual, endTime: getActualTime(endConceptual), x: 50, y: 50, size: 80, rotation: 0, animation: 'pop', link: '' }
            ];
            setOverlays(newOverlays); saveHistory(segments, newOverlays);
          };
        }
      };

      const handleLoadedMetadata = () => {
        const dur = videoRef.current.duration;
        setDuration(dur);

        const videoWidth = videoRef.current.videoWidth;
        const videoHeight = videoRef.current.videoHeight;
        const canvasWidth = 640; 
        const canvasHeight = (videoHeight / videoWidth) * canvasWidth;
        canvasRef.current.width = canvasWidth; canvasRef.current.height = canvasHeight;

        setIsVideoVertical(videoHeight > videoWidth); 

        const draftStr = localStorage.getItem('kdrawcut_draft');
        if (draftStr) {
          try {
            const draft = JSON.parse(draftStr);
            if (Math.abs(draft.duration - dur) < 1) {
              setSegments(draft.segments);
              setOverlays(draft.overlays);
              setGlobalEffects(draft.globalEffects || []);
              saveHistory(draft.segments, draft.overlays, draft.globalEffects || []);
              showToastMessage('✅ 已成功為您恢復上次的編輯進度！');
              return; 
            } else {
              showToastMessage('⚠️ 影片長度與草稿不符，將作為新專案開啟。');
            }
          } catch(e) { console.error(e); }
        }

        const initialSegments = [{ id: 'seg-init', start: 0, end: dur, isDeleted: false }];
        setSegments(initialSegments); setOverlays([]); setGlobalEffects([]); saveHistory(initialSegments, [], []);
      };

      const handleSplit = () => {
        if (!videoUrl) return;
        const timeNow = currentTime;
        const currentSegIndex = segments.findIndex(s => !s.isDeleted && timeNow > s.start + 0.1 && timeNow < s.end - 0.1);
        if (currentSegIndex === -1) return; 
        
        const targetSeg = segments[currentSegIndex];
        const newSegments = [...segments];
        const seg1 = { id: `seg-${Date.now()}-1`, start: targetSeg.start, end: timeNow, isDeleted: false };
        const seg2 = { id: `seg-${Date.now()}-2`, start: timeNow, end: targetSeg.end, isDeleted: false };
        
        newSegments.splice(currentSegIndex, 1, seg1, seg2);
        setSegments(newSegments); saveHistory(newSegments, overlays); setSelectedSegmentId(seg1.id);
      };

      const handleDeleteSegment = () => {
        if (!selectedSegmentId) return;
        const newSegments = segments.map(s => s.id === selectedSegmentId ? { ...s, isDeleted: true } : s);
        setSegments(newSegments); setSelectedSegmentId(null); saveHistory(newSegments, overlays);
        const nextValid = newSegments.find(s => !s.isDeleted && s.start >= currentTime);
        if (nextValid && videoRef.current) videoRef.current.currentTime = nextValid.start;
      };

      const validSegments = segments.filter(s => !s.isDeleted).sort((a, b) => a.start - b.start);
      const validDuration = validSegments.reduce((acc, s) => acc + (s.end - s.start), 0);

      const getConceptualTime = (actualTime) => {
        let conceptual = 0;
        for (let seg of validSegments) {
          if (actualTime < seg.start) break;
          if (actualTime >= seg.start && actualTime <= seg.end) return conceptual + (actualTime - seg.start);
          conceptual += (seg.end - seg.start);
        }
        return conceptual;
      };

      const getActualTime = (conceptualTime) => {
        let acc = 0;
        for (let seg of validSegments) {
          let dur = seg.end - seg.start;
          if (conceptualTime <= acc + dur) return seg.start + (conceptualTime - acc);
          acc += dur;
        }
        return validSegments.length ? validSegments[validSegments.length - 1].end : 0;
      };

      const getOverlayDimensions = (item, ctx) => {
          let w = 0; let h = 0;
          if (item.type === 'image') {
             const imgRatio = item.imgElement ? item.imgElement.width / item.imgElement.height : 1;
             w = item.size * 2; h = w / imgRatio;
          } else {
            let fontFamily = '"Noto Sans TC", sans-serif';
            const fontMap = {
              'cyberpunk': '"Orbitron", "Noto Sans TC", sans-serif',
              'variety_pop': '"Dela Gothic One", sans-serif',
              'comic': '"Bangers", "Dela Gothic One", sans-serif',
              'vlog_daily': '"Zen Maru Gothic", sans-serif',
              'cute_pet': '"Mochiy Pop One", sans-serif',
              'movie_intro': '"Noto Serif TC", serif',
              'promo': '"Dela Gothic One", sans-serif',
              'retro_vhs': '"Courier New", monospace',
              'subtitle_bar': '"Noto Sans TC", sans-serif',
              'gufeng': '"BiauKai", "DFKai-SB", "KaiTi", "Noto Serif TC", serif',
              'fire_burn': '"Dela Gothic One", sans-serif',
              'glow_shine': '"Noto Sans TC", sans-serif',
              'love_shout': '"Mochiy Pop One", sans-serif',
              'warning_cyber': '"Orbitron", "Noto Sans TC", sans-serif'
            };

            let tplData = customTemplates.find(t => t.id === item.templateStyle);
            if(tplData) fontFamily = tplData.fontFamily;
            else if (fontMap[item.templateStyle]) fontFamily = fontMap[item.templateStyle];
            
            ctx.font = `900 ${item.size}px ${fontFamily}`;
            const lines = item.content.split('\n');

            if (item.templateStyle === 'gufeng') {
               const maxChars = Math.max(...lines.map(l => l.length));
               w = lines.length * (item.size * 1.5);
               h = maxChars * (item.size * 1.1) + item.size;
            } else {
               let maxW = 0;
               lines.forEach(l => maxW = Math.max(maxW, ctx.measureText(l).width));
               w = maxW + item.size * 1.2;
               h = lines.length * (item.size * 1.2) + item.size * 1.3;
               if (item.templateStyle === 'warning_cyber') {
                   w += item.size * 1.2; h += item.size * 0.4;
               }
            }
          }
          return { w, h };
      };

      const handleCanvasPointerDown = (e) => {
        if (!canvasRef.current || !videoRef.current || overlays.length === 0) return;
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const pointerX = (e.clientX - rect.left) * scaleX;
        const pointerY = (e.clientY - rect.top) * scaleY;
        const timeNow = currentTime;
        const ctx = canvas.getContext('2d');
        let hitId = null;

        for (let i = overlays.length - 1; i >= 0; i--) {
          const item = overlays[i];
          if (timeNow >= item.startTime && timeNow <= item.endTime) {
            const centerX = canvas.width * (item.x / 100);
            const centerY = canvas.height * (item.y / 100);
            const theta = (item.rotation || 0) * Math.PI / 180;
            const dx = pointerX - centerX;
            const dy = pointerY - centerY;
            const localX = dx * Math.cos(-theta) - dy * Math.sin(-theta);
            const localY = dx * Math.sin(-theta) + dy * Math.cos(-theta);

            const { w, h } = getOverlayDimensions(item, ctx);
            const scaleHandleDist = Math.hypot(localX - w/2, localY - h/2);
            const rotateHandleDist = Math.hypot(localX - 0, localY - (-h/2 - item.size * 0.8));
            const handleRadius = Math.max(30, item.size * 0.4);

            if (selectedOverlayId === item.id) {
              if (rotateHandleDist <= handleRadius) {
                setDraggingOverlayId(item.id); setDragAction('rotate'); e.currentTarget.setPointerCapture(e.pointerId); return;
              }
              if (scaleHandleDist <= handleRadius) {
                setDraggingOverlayId(item.id); setDragAction('scale'); setDragOffset({ initDist: Math.hypot(dx, dy), initSize: item.size }); e.currentTarget.setPointerCapture(e.pointerId); return;
              }
            }

            if (Math.abs(localX) <= w/2 && Math.abs(localY) <= h/2) {
              hitId = item.id; setDraggingOverlayId(item.id); setDragAction('move');
              setDragOffset({ dx: (pointerX / canvas.width * 100) - item.x, dy: (pointerY / canvas.height * 100) - item.y });
              break; 
            }
          }
        }
        setSelectedOverlayId(hitId); 
        setSelectedEffectId(null); 
        if (hitId) e.currentTarget.setPointerCapture(e.pointerId);
      };

      const handleCanvasPointerMove = (e) => {
        if (!draggingOverlayId || !canvasRef.current) return;
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const pointerX = (e.clientX - rect.left) * scaleX;
        const pointerY = (e.clientY - rect.top) * scaleY;

        const newOverlays = overlays.map(item => {
          if (item.id === draggingOverlayId) {
            if (dragAction === 'move') {
              return { ...item, x: Math.max(0, Math.min(100, (pointerX / canvas.width) * 100 - dragOffset.dx)), y: Math.max(0, Math.min(100, (pointerY / canvas.height) * 100 - dragOffset.dy)) };
            } else if (dragAction === 'scale') {
              const centerX = canvas.width * (item.x / 100); const centerY = canvas.height * (item.y / 100);
              const currentDist = Math.hypot(pointerX - centerX, pointerY - centerY);
              return { ...item, size: Math.max(10, Math.min(400, dragOffset.initSize * (currentDist / dragOffset.initDist))) };
            } else if (dragAction === 'rotate') {
              const centerX = canvas.width * (item.x / 100); const centerY = canvas.height * (item.y / 100);
              let deg = Math.atan2(pointerY - centerY, pointerX - centerX) * (180 / Math.PI) + 90;
              return { ...item, rotation: Math.round((deg % 360 + 360) % 360) };
            }
          }
          return item;
        });
        setOverlays(newOverlays);
      };

      const handleCanvasPointerUp = (e) => {
        if (draggingOverlayId) {
          setDraggingOverlayId(null); e.currentTarget.releasePointerCapture(e.pointerId); saveHistory(segments, overlays);
        }
      };

      const updateTimeFromPointer = (clientX) => {
        if (!videoRef.current || validDuration === 0 || !timelineInnerRef.current) return;
        const rect = timelineInnerRef.current.getBoundingClientRect();
        let posX = clientX - rect.left; 
        let targetConceptual = posX / zoomLevel;
        targetConceptual = Math.max(0, Math.min(validDuration, targetConceptual));
        const targetActual = getActualTime(targetConceptual);
        videoRef.current.currentTime = targetActual;
        setCurrentTime(targetActual);
      };

      const handleTimelinePointerDown = (e) => {
        setIsScrubbing(true); e.currentTarget.setPointerCapture(e.pointerId); updateTimeFromPointer(e.clientX);
        if (isPlaying) togglePlay();
      };

      const handleTimelinePointerMove = (e) => {
        if (!isScrubbing) return; updateTimeFromPointer(e.clientX);
      };

      const handleTimelinePointerUp = (e) => {
        setIsScrubbing(false); e.currentTarget.releasePointerCapture(e.pointerId);
      };

      const handleOverlayTrackPointerDown = (e, id, action, isGlobalEffect = false) => {
        e.stopPropagation(); e.currentTarget.setPointerCapture(e.pointerId);
        if (isGlobalEffect) {
            const item = globalEffects.find(o => o.id === id);
            setOverlayTimelineDrag({ id, action, isGlobalEffect, initCStart: getConceptualTime(item.startTime), initCEnd: getConceptualTime(item.endTime), startX: e.clientX, pointerId: e.pointerId });
        } else {
            const item = overlays.find(o => o.id === id);
            setOverlayTimelineDrag({ id, action, isGlobalEffect, initCStart: getConceptualTime(item.startTime), initCEnd: getConceptualTime(item.endTime), startX: e.clientX, pointerId: e.pointerId });
        }
      };

      const handleOverlayTrackPointerMove = (e) => {
        if (!overlayTimelineDrag || !timelineInnerRef.current) return;
        const deltaConceptual = (e.clientX - overlayTimelineDrag.startX) / zoomLevel;
        
        if (overlayTimelineDrag.isGlobalEffect) {
            const newEffects = globalEffects.map(item => {
              if (item.id !== overlayTimelineDrag.id) return item;
              let newCStart = overlayTimelineDrag.initCStart; let newCEnd = overlayTimelineDrag.initCEnd;
              if (overlayTimelineDrag.action === 'move') {
                newCStart += deltaConceptual; newCEnd += deltaConceptual;
                if (newCStart < 0) { newCEnd -= newCStart; newCStart = 0; }
                if (newCEnd > validDuration) { newCStart -= (newCEnd - validDuration); newCEnd = validDuration; }
              } else if (overlayTimelineDrag.action === 'trimLeft') {
                newCStart += deltaConceptual; if (newCStart < 0) newCStart = 0; if (newCStart > newCEnd - 0.2) newCStart = newCEnd - 0.2; 
              } else if (overlayTimelineDrag.action === 'trimRight') {
                newCEnd += deltaConceptual; if (newCEnd > validDuration) newCEnd = validDuration; if (newCEnd < newCStart + 0.2) newCEnd = newCStart + 0.2;
              }
              return { ...item, startTime: getActualTime(newCStart), endTime: getActualTime(newCEnd) };
            });
            setGlobalEffects(newEffects);
        } else {
            const newOverlays = overlays.map(item => {
              if (item.id !== overlayTimelineDrag.id) return item;
              let newCStart = overlayTimelineDrag.initCStart; let newCEnd = overlayTimelineDrag.initCEnd;
              if (overlayTimelineDrag.action === 'move') {
                newCStart += deltaConceptual; newCEnd += deltaConceptual;
                if (newCStart < 0) { newCEnd -= newCStart; newCStart = 0; }
                if (newCEnd > validDuration) { newCStart -= (newCEnd - validDuration); newCEnd = validDuration; }
              } else if (overlayTimelineDrag.action === 'trimLeft') {
                newCStart += deltaConceptual; if (newCStart < 0) newCStart = 0; if (newCStart > newCEnd - 0.2) newCStart = newCEnd - 0.2; 
              } else if (overlayTimelineDrag.action === 'trimRight') {
                newCEnd += deltaConceptual; if (newCEnd > validDuration) newCEnd = validDuration; if (newCEnd < newCStart + 0.2) newCEnd = newCStart + 0.2;
              }
              return { ...item, startTime: getActualTime(newCStart), endTime: getActualTime(newCEnd) };
            });
            setOverlays(newOverlays);
        }
      };

      const handleOverlayTrackPointerUp = (e) => {
        if (overlayTimelineDrag) {
          e.currentTarget.releasePointerCapture(overlayTimelineDrag.pointerId); 
          saveHistory(segments, overlays, globalEffects);
          setOverlayTimelineDrag(null); 
        }
      };

      useEffect(() => {
        if (isPlaying && timelineContainerRef.current) {
          const playheadX = getConceptualTime(currentTime) * zoomLevel;
          const container = timelineContainerRef.current;
          const scrollLeft = container.scrollLeft;
          const containerWidth = container.clientWidth;
          if (playheadX > scrollLeft + containerWidth * 0.8 || playheadX < scrollLeft) {
            container.scrollTo({ left: Math.max(0, playheadX - containerWidth * 0.2), behavior: 'smooth' });
          }
        }
      }, [currentTime, isPlaying, zoomLevel, validSegments]);

      const togglePlay = () => {
        if (!videoRef.current) return;
        if (videoRef.current.paused) {
          if (validSegments.length === 0) return;
          const timeNow = videoRef.current.currentTime;
          const activeValidSegIndex = validSegments.findIndex(s => timeNow >= s.start && timeNow < s.end);
          if (activeValidSegIndex === -1) {
            const nextValid = validSegments.find(s => s.start >= timeNow);
            if (nextValid) videoRef.current.currentTime = nextValid.start;
            else videoRef.current.currentTime = validSegments[0].start;
          }
          videoRef.current.play(); setIsPlaying(true);
        } else {
          videoRef.current.pause(); setIsPlaying(false);
        }
      };

      const drawFrame = () => {
        if (!videoRef.current || !canvasRef.current) return;
        const video = videoRef.current;
        if (video.seeking) { animationRef.current = requestAnimationFrame(drawFrame); return; }

        let timeNow = video.currentTime;
        if (isPlaying && !isExporting && !isScrubbing) {
          const activeValidSegIndex = validSegments.findIndex(s => timeNow >= s.start && timeNow < s.end);
          if (activeValidSegIndex === -1) {
            const nextValid = validSegments.find(s => s.start >= timeNow);
            if (nextValid) { video.currentTime = nextValid.start; } 
            else { video.pause(); setIsPlaying(false); if (validSegments.length > 0) video.currentTime = validSegments[0].start; }
          }
        }

        const ctx = canvasRef.current.getContext('2d');
        const canvas = canvasRef.current;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let shakeOffsetX = 0; let shakeOffsetY = 0;
        const activeEffects = globalEffects.filter(ef => timeNow >= ef.startTime && timeNow <= ef.endTime);
        
        if (activeEffects.some(ef => ef.effectType === 'shake')) {
            shakeOffsetX = (Math.random() - 0.5) * 20; shakeOffsetY = (Math.random() - 0.5) * 20;
        }
        ctx.drawImage(video, shakeOffsetX, shakeOffsetY, canvas.width, canvas.height);

        activeEffects.forEach(ef => {
           const timeActive = timeNow - ef.startTime;
           const duration = ef.endTime - ef.startTime;

           if (ef.effectType === 'custom' && ef.templateId) {
              const cTpl = customTemplates.find(t => t.id === ef.templateId);
              if (cTpl && cTpl.type === 'transition') {
                 const progress = timeActive / duration;
                 const intensityMult = Math.max(0, 1 - Math.abs(progress - 0.5) * 2);
                 const intensityVal = cTpl.intensity / 100;
                 
                 if (cTpl.transStyle === 'flash') {
                     ctx.globalAlpha = intensityMult * intensityVal;
                     ctx.fillStyle = cTpl.color;
                     ctx.fillRect(0, 0, canvas.width, canvas.height);
                     ctx.globalAlpha = 1.0;
                 } 
                 else if (cTpl.transStyle === 'glitch') {
                     const numSlices = 15;
                     const maxOffset = intensityMult * intensityVal * canvas.width * 0.1;
                     for(let i=0; i<numSlices; i++) {
                         const sy = (i/numSlices) * canvas.height;
                         const sh = canvas.height / numSlices;
                         const dx = (Math.random() - 0.5) * 2 * maxOffset;
                         const videoSy = (i/numSlices) * video.videoHeight;
                         const videoSh = video.videoHeight / numSlices;
                         ctx.drawImage(video, 0, videoSy, video.videoWidth, videoSh, dx, sy, canvas.width, sh);
                     }
                 } 
                 else if (cTpl.transStyle === 'pixelate') {
                     const bs = Math.floor(1 + intensityMult * intensityVal * 30);
                     if (bs > 1) {
                         ctx.imageSmoothingEnabled = false;
                         ctx.drawImage(video, 0, 0, canvas.width/bs, canvas.height/bs);
                         ctx.drawImage(canvas, 0, 0, canvas.width/bs, canvas.height/bs, 0, 0, canvas.width, canvas.height);
                         ctx.imageSmoothingEnabled = true;
                     }
                 } 
                 else if (cTpl.transStyle === 'rgb_split') {
                     const offset = intensityMult * intensityVal * 40;
                     ctx.globalCompositeOperation = 'screen';
                     ctx.globalAlpha = 0.5;
                     ctx.drawImage(video, offset, 0, canvas.width, canvas.height);
                     ctx.drawImage(video, -offset, 0, canvas.width, canvas.height);
                     ctx.globalCompositeOperation = 'source-over';
                     ctx.globalAlpha = 1.0;
                 }
              }
           }
           else if (ef.effectType === 'speed_lines') {
              ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2); ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2;
              for (let i = 0; i < 40; i++) {
                 const angle = Math.random() * Math.PI * 2; const innerRadius = canvas.width * 0.3 + Math.random() * 50; const outerRadius = canvas.width;
                 ctx.beginPath(); ctx.moveTo(Math.cos(angle) * innerRadius, Math.sin(angle) * innerRadius); ctx.lineTo(Math.cos(angle) * outerRadius, Math.sin(angle) * outerRadius); ctx.stroke();
              }
              ctx.restore();
           } 
           else if (ef.effectType === 'neon_glitch') {
              const glitchAmount = Math.sin(timeActive * 30) * 10;
              ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = 'rgba(255, 0, 0, 0.3)'; ctx.fillRect(glitchAmount, 0, canvas.width, canvas.height); ctx.fillStyle = 'rgba(0, 255, 255, 0.3)'; ctx.fillRect(-glitchAmount, 0, canvas.width, canvas.height); ctx.globalCompositeOperation = 'source-over';
              ctx.fillStyle = 'rgba(255,255,255,0.05)'; for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i + (timeActive * 50 % 4), canvas.width, 1);
           }

                                    {[
                                      {id: 'default', name: '基礎無底框'}, 
                                      {id: 'fire_burn', name: '🔥 燃爆火焰'},
                                      {id: 'glow_shine', name: '✨ 最閃耀'},
                                      {id: 'love_shout', name: '💖 大聲說愛'},
                                      {id: 'warning_cyber', name: '⚠️ 科技警告'},
                                      {id: 'adboard', name: '📢 廣告看板'}, 
                                      {id: 'variety_pop', name: '📺 綜藝大字'}, 
                                      {id: 'subtitle_bar', name: '💬 專業字幕條'},
                                      {id: 'gufeng', name: '📜 古風水墨'},
                                      {id: 'promo', name: '🔥 爆款促銷'},
                                      {id: 'cute_pet', name: '🐾 可愛萌寵'}, 
                                      {id: 'vlog_daily', name: '📝 質感日常'}, 
                                      {id: 'movie_intro', name: '🎬 電影開場'}, 
                                      {id: 'cyberpunk', name: '⚡ 科技霓虹'}, 
                                      {id: 'comic', name: '💥 美漫爆發'},
                                      {id: 'retro_vhs', name: '📼 復古VHS'},
                                      ...customTemplates.filter(t => t.type === 'text').map(t => ({id: t.id, name: '🎨 ' + t.name}))
                                    ].map(style => (
                                      <button key={style.id} onClick={() => {
                                          const newOverlays = overlays.map(t => t.id === item.id ? { ...t, templateStyle: style.id } : t);
                                          setOverlays(newOverlays); saveHistory(segments, newOverlays);
                                        }}
                                        className={`py-1.5 px-2 text-[10px] rounded border transition ${item.templateStyle === style.id ? (style.id.startsWith('custom_') ? 'bg-pink-900/40 border-pink-400 text-pink-300' : 'bg-cyan-900/40 border-cyan-400 text-cyan-300') : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'}`}
                                      >
                                        {style.name}
                                      </button>
                                    ))}
                                 </div>
                              </div>
                            )}

                            <div className="grid grid-cols-4 gap-2">
                              {['none', 'fade', 'pop', item.type==='text' ? 'typewriter' : 'slideUp'].map(anim => (
                                <button key={anim} onClick={() => {
                                    const newOverlays = overlays.map(t => t.id === item.id ? { ...t, animation: anim } : t);
                                    setOverlays(newOverlays); saveHistory(segments, newOverlays);
                                  }}
                                  className={`py-1.5 text-[10px] rounded border transition ${item.animation === anim ? 'bg-cyan-900/40 border-cyan-400 text-cyan-300' : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'}`}
                                >
                                  {anim === 'none' ? '無特效' : anim === 'fade' ? '淡入' : anim === 'pop' ? '彈出' : anim === 'slideUp' ? '上滑' : '打字機'}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MobileTechVideoEditor />);
  </script>
</body>
</html>
