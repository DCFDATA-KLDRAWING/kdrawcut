<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KDrawCUT - 手機版科技感影片編輯器</title>

  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KDrawCUT">
  
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1Non2p5IUFcBtKWqq0P8LulQo-Df83ivk">
  
  <link rel="manifest" href='data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22KDrawCUT%22%2C%22short_name%22%3A%22KDrawCUT%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23020617%22%2C%22theme_color%22%3A%22%23020617%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Flh3.googleusercontent.com%2Fd%2F1Non2p5IUFcBtKWqq0P8LulQo-Df83ivk%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D'>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <style>
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #020617; overflow: hidden; overscroll-behavior: none; }
    #root { width: 100%; height: 100%; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Upload, Play, Pause, Download, Plus, Trash2, Type, Scissors, Undo2, Redo2, LayoutPanelTop, SmilePlus, LayoutTemplate, Palette, Save, ArrowLeft, Image as ImageIcon, Link as LinkIcon } from 'lucide-react';

    const loadFonts = () => {
      if (!document.getElementById('kdrawcut-fonts')) {
        const link = document.createElement('link');
        link.id = 'kdrawcut-fonts';
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Bangers&family=Dela+Gothic+One&family=Noto+Sans+TC:wght@400;900&family=Orbitron:wght@900&family=Mochiy+Pop+One&family=Potta+One&family=Zen+Maru+Gothic:wght@900&display=swap';
        document.head.appendChild(link);
      }
    };

    function TemplateLab({ onBack, customTemplates, setCustomTemplates, showToastMessage }) {
      const [tpl, setTpl] = useState({
        name: '我的專屬模版',
        fontFamily: '"Noto Sans TC", sans-serif',
        color: '#FFFFFF',
        useGradient: false,
        gradientColor2: '#00F0FF',
        strokeColor: '#000000',
        strokeWidth: 4,
        strokeColor2: '#FFFFFF', 
        strokeWidth2: 0,
        boxStyle: 'none', 
        boxColor: 'rgba(15, 23, 42, 0.8)',
        icon: 'none', 
        shadow: true,
      });

      const previewCanvasRef = useRef(null);
      const animationRef = useRef(null);

      const renderPreview = () => {
        if (!previewCanvasRef.current) return;
        const ctx = previewCanvasRef.current.getContext('2d');
        const canvas = previewCanvasRef.current;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for(let i=0; i<canvas.width; i+=20) {
           ctx.fillStyle = 'rgba(255,255,255,0.02)';
           ctx.fillRect(i, 0, 1, canvas.height);
           ctx.fillRect(0, i, canvas.width, 1);
        }

        const currentSize = 45;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        let displayText = '訂閱 KDrawCUT';
        if (tpl.icon === 'bell') displayText = '🔔 ' + displayText;
        if (tpl.icon === 'like') displayText = '👍 ' + displayText;
        if (tpl.icon === 'star') displayText = '⭐ ' + displayText;

        ctx.save();
        ctx.translate(centerX, centerY);
        
        ctx.font = `900 ${currentSize}px ${tpl.fontFamily}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        const textWidth = ctx.measureText(displayText).width;
        const paddingX = currentSize * 0.8;
        const paddingY = currentSize * 0.5;
        const bw = textWidth + paddingX * 2;
        const bh = currentSize + paddingY * 2;

        if (tpl.boxStyle !== 'none') {
           ctx.fillStyle = tpl.boxColor;
           ctx.beginPath();
           if (tpl.boxStyle === 'cyber') {
              ctx.moveTo(-bw/2 + 10, -bh/2);
              ctx.lineTo(bw/2, -bh/2);
              ctx.lineTo(bw/2 - 10, bh/2);
              ctx.lineTo(-bw/2, bh/2);
              ctx.fill();
           } else if (tpl.boxStyle === 'pill') {
              if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, currentSize);
              else ctx.fillRect(-bw/2, -bh/2, bw, bh);
              ctx.fill();
           } else if (tpl.boxStyle === 'bubble') {
              if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, 15);
              else ctx.fillRect(-bw/2, -bh/2, bw, bh);
              ctx.fill();
              ctx.beginPath();
              ctx.moveTo(-10, bh/2);
              ctx.lineTo(10, bh/2);
              ctx.lineTo(0, bh/2 + 15);
              ctx.fill();
           } else if (tpl.boxStyle === 'glass') {
              ctx.fillStyle = 'rgba(255,255,255,0.1)';
              ctx.strokeStyle = 'rgba(255,255,255,0.4)';
              ctx.lineWidth = 2;
              if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, 20);
              else ctx.fillRect(-bw/2, -bh/2, bw, bh);
              ctx.fill(); ctx.stroke();
           } else if (tpl.boxStyle === 'ribbon') {
              ctx.moveTo(-bw/2, -bh/2);
              ctx.lineTo(bw/2, -bh/2);
              ctx.lineTo(bw/2 - 20, 0); 
              ctx.lineTo(bw/2, bh/2);
              ctx.lineTo(-bw/2, bh/2);
              ctx.lineTo(-bw/2 + 20, 0); 
              ctx.fill();
           } else if (tpl.boxStyle === 'tape') {
              ctx.save();
              ctx.rotate(-2 * Math.PI / 180);
              ctx.fillStyle = tpl.boxColor || 'rgba(255, 250, 200, 0.85)';
              ctx.fillRect(-bw/2 - 10, -bh/2, bw + 20, bh);
              ctx.restore();
           } else if (tpl.boxStyle === 'neon') {
              ctx.shadowBlur = 15;
              ctx.shadowColor = tpl.boxColor;
              ctx.strokeStyle = tpl.boxColor;
              ctx.lineWidth = 3;
              ctx.strokeRect(-bw/2, -bh/2, bw, bh);
              ctx.shadowBlur = 0;
           }
        }

        if (tpl.shadow) {
            ctx.shadowColor = tpl.color;
            ctx.shadowBlur = 15;
        } else {
            ctx.shadowBlur = 0;
        }

        if (tpl.strokeWidth2 > 0) {
            ctx.lineWidth = tpl.strokeWidth + tpl.strokeWidth2 * 2;
            ctx.strokeStyle = tpl.strokeColor2;
            ctx.lineJoin = 'round';
            ctx.strokeText(displayText, 0, 0);
        }

        if (tpl.strokeWidth > 0) {
            ctx.lineWidth = tpl.strokeWidth;
            ctx.strokeStyle = tpl.strokeColor;
            ctx.lineJoin = 'round';
            ctx.strokeText(displayText, 0, 0);
        }

        if (tpl.useGradient) {
            const gradient = ctx.createLinearGradient(0, -currentSize/2, 0, currentSize/2);
            gradient.addColorStop(0, tpl.color);
            gradient.addColorStop(1, tpl.gradientColor2);
            ctx.fillStyle = gradient;
        } else {
            ctx.fillStyle = tpl.color;
        }
        
        ctx.fillText(displayText, 0, 0);

        ctx.restore();
        animationRef.current = requestAnimationFrame(renderPreview);
      };

      useEffect(() => {
        animationRef.current = requestAnimationFrame(renderPreview);
        return () => cancelAnimationFrame(animationRef.current);
      }, [tpl]);

      const handleSave = () => {
        const newTpl = { ...tpl, id: `custom_${Date.now()}` };
        const updatedList = [...customTemplates, newTpl];
        setCustomTemplates(updatedList);
        localStorage.setItem('kdrawcut_custom_templates', JSON.stringify(updatedList));
        showToastMessage('🎉 模版儲存成功！現在可以去編輯器使用了');
        onBack();
      };

      return (
        <div className="absolute inset-0 z-50 bg-slate-950 flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-300 overflow-hidden">
          <header className="flex justify-between items-center p-4 bg-slate-900 border-b border-cyan-900/50 shrink-0 shadow-md z-10">
            <button onClick={onBack} className="flex items-center gap-1 text-slate-400 hover:text-cyan-400 transition">
              <ArrowLeft size={20} /> <span className="font-bold">返回編輯</span>
            </button>
            <div className="font-bold text-pink-400 tracking-wider flex items-center gap-2"><Palette size={18}/> 模版實驗室</div>
            <button onClick={handleSave} className="flex items-center gap-1 bg-pink-600 hover:bg-pink-500 text-white px-4 py-1.5 rounded-full font-bold transition shadow-[0_0_15px_rgba(219,39,119,0.5)]">
              <Save size={16} /> 儲存
            </button>
          </header>

          <div className="w-full bg-black relative flex items-center justify-center border-b border-slate-800 shrink-0 h-[30vh]">
            <canvas ref={previewCanvasRef} width={640} height={300} className="w-full h-full object-contain" />
            <div className="absolute bottom-2 right-2 text-[10px] text-white/40 bg-black/50 px-2 py-1 rounded pointer-events-none">即時預覽引擎</div>
          </div>

          <div className="flex-1 overflow-y-auto p-4 pb-32 space-y-5">
            <div className="space-y-2">
              <label className="text-xs font-bold text-slate-400">自訂模版名稱</label>
              <input type="text" value={tpl.name} onChange={e=>setTpl({...tpl, name:e.target.value})} className="w-full bg-slate-900 text-white font-bold border border-slate-700 rounded-lg px-3 py-2 focus:border-pink-500 focus:outline-none" />
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div className="space-y-2">
                <label className="text-xs font-bold text-slate-400">字型風格</label>
                <select value={tpl.fontFamily} onChange={e=>setTpl({...tpl, fontFamily:e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-pink-500 focus:outline-none">
                  <option value='"Noto Sans TC", sans-serif'>標準字體</option>
                  <option value='"Dela Gothic One", sans-serif'>綜藝特黑 (Dela)</option>
                  <option value='"Zen Maru Gothic", sans-serif'>日系圓體 (Zen)</option>
                  <option value='"Mochiy Pop One", sans-serif'>可愛膨脹 (Mochiy)</option>
                  <option value='"Potta One", sans-serif'>麥克筆手寫 (Potta)</option>
                  <option value='"Orbitron", "Noto Sans TC", sans-serif'>科幻機械 (Orbitron)</option>
                  <option value='"Bangers", "Dela Gothic One", sans-serif'>美漫爆發 (Bangers)</option>
                </select>
              </div>
              <div className="space-y-2">
                <label className="text-xs font-bold text-slate-400">前綴圖示</label>
                <select value={tpl.icon} onChange={e=>setTpl({...tpl, icon:e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-pink-500 focus:outline-none">
                  <option value="none">無圖示</option>
                  <option value="bell">🔔 小鈴鐺</option>
                  <option value="like">👍 按讚</option>
                  <option value="star">⭐ 星星</option>
                </select>
              </div>
            </div>

            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-4">
               <div className="flex justify-between items-center">
                  <label className="text-xs font-bold text-pink-300">文字本體顏色</label>
                  <label className="flex items-center gap-2 text-xs text-slate-400">
                    <input type="checkbox" checked={tpl.useGradient} onChange={e=>setTpl({...tpl, useGradient: e.target.checked})} className="accent-pink-500" />
                    啟用漸層色
                  </label>
               </div>
               <div className="flex gap-4">
                  <input type="color" value={tpl.color} onChange={e=>setTpl({...tpl, color:e.target.value})} className="w-full h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1" />
                  {tpl.useGradient && (
                     <input type="color" value={tpl.gradientColor2} onChange={e=>setTpl({...tpl, gradientColor2:e.target.value})} className="w-full h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1" />
                  )}
               </div>
               <label className="flex items-center gap-2 text-xs text-slate-400 pt-2 border-t border-slate-800">
                  <input type="checkbox" checked={tpl.shadow} onChange={e=>setTpl({...tpl, shadow:e.target.checked})} className="accent-pink-500 w-4 h-4" />
                  <span>開啟文字發光 (霓虹光暈效果)</span>
               </label>
            </div>

            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-4">
              <label className="text-xs font-bold text-pink-300">文字描邊 (支援雙層)</label>
              <div className="flex items-center gap-3">
                <input type="color" value={tpl.strokeColor} onChange={e=>setTpl({...tpl, strokeColor:e.target.value})} className="w-10 h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1 shrink-0" />
                <div className="flex-1">
                  <span className="text-[10px] text-slate-400 mb-1 block">內邊框粗細 ({tpl.strokeWidth}px)</span>
                  <input type="range" min="0" max="25" value={tpl.strokeWidth} onChange={e=>setTpl({...tpl, strokeWidth:parseInt(e.target.value)})} className="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-pink-500" />
                </div>
              </div>
              <div className="flex items-center gap-3 pt-2 border-t border-slate-800/50">
                <input type="color" value={tpl.strokeColor2} onChange={e=>setTpl({...tpl, strokeColor2:e.target.value})} className="w-10 h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1 shrink-0" />
                <div className="flex-1">
                  <span className="text-[10px] text-slate-400 mb-1 block">外邊框粗細 ({tpl.strokeWidth2}px)</span>
                  <input type="range" min="0" max="25" value={tpl.strokeWidth2} onChange={e=>setTpl({...tpl, strokeWidth2:parseInt(e.target.value)})} className="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-pink-500" />
                </div>
              </div>
            </div>

            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
              <label className="text-xs font-bold text-pink-300">文字底框形狀</label>
              <div className="grid grid-cols-4 gap-2">
                {['none', 'cyber', 'pill', 'bubble', 'glass', 'ribbon', 'tape', 'neon'].map(style => (
                   <button key={style} onClick={()=>setTpl({...tpl, boxStyle: style})} className={`py-2 text-[10px] rounded border transition flex flex-col items-center justify-center gap-1 ${tpl.boxStyle === style ? 'bg-pink-900/40 border-pink-500 text-pink-300 shadow-[0_0_10px_rgba(219,39,119,0.3)]' : 'bg-slate-950 border-slate-700 text-slate-400 hover:bg-slate-800'}`}>
                      {style === 'none' ? '無底框' : style === 'cyber' ? '科技斜切' : style === 'pill' ? '甜美圓角' : style === 'bubble' ? '對話氣泡' : style === 'glass' ? '毛玻璃' : style === 'ribbon' ? '緞帶標籤' : style === 'tape' ? '紙膠帶' : '霓虹框'}
                   </button>
                ))}
              </div>
              {tpl.boxStyle !== 'none' && tpl.boxStyle !== 'glass' && (
                <div className="flex items-center gap-3 pt-3">
                  <span className="text-xs font-bold text-slate-400">底框顏色</span>
                  <input type="color" value={tpl.boxColor.length === 7 ? tpl.boxColor : '#0f172a'} onChange={e=>setTpl({...tpl, boxColor:e.target.value})} className="w-full h-8 rounded cursor-pointer bg-slate-950 border border-slate-700 p-0.5" />
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    function MobileTechVideoEditor() {
      const [appMode, setAppMode] = useState('home'); 
      const [customTemplates, setCustomTemplates] = useState([]);

      const [videoUrl, setVideoUrl] = useState('');
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      
      const [isExporting, setIsExporting] = useState(false);
      const [exportProgress, setExportProgress] = useState(0);

      const [segments, setSegments] = useState([]); 
      const [overlays, setOverlays] = useState([]); 
      const [selectedSegmentId, setSelectedSegmentId] = useState(null);
      
      const [history, setHistory] = useState([]);
      const [historyPointer, setHistoryPointer] = useState(-1);

      const [zoomLevel, setZoomLevel] = useState(50); 

      const [isScrubbing, setIsScrubbing] = useState(false);
      const [draggingOverlayId, setDraggingOverlayId] = useState(null);
      const [dragOffset, setDragOffset] = useState({ dx: 0, dy: 0, initDist: 0, initSize: 0 });
      
      const [selectedOverlayId, setSelectedOverlayId] = useState(null);
      const [dragAction, setDragAction] = useState('move');
      
      const timelineContainerRef = useRef(null);
      const timelineInnerRef = useRef(null);
      const [overlayTimelineDrag, setOverlayTimelineDrag] = useState(null);

      const [hasDraft, setHasDraft] = useState(false);
      const [toastMsg, setToastMsg] = useState('');

      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const animationRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const recordedChunksRef = useRef([]);

      const showToastMessage = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      useEffect(() => {
        loadFonts(); 
        const draft = localStorage.getItem('kdrawcut_draft');
        if (draft) setHasDraft(true);
        const storedTpls = localStorage.getItem('kdrawcut_custom_templates');
        if (storedTpls) setCustomTemplates(JSON.parse(storedTpls));
      }, []);

      useEffect(() => {
        if (videoUrl && duration > 0) {
          if (segments.length > 1 || overlays.length > 0 || segments[0]?.isDeleted) {
            const draftData = { segments, overlays, duration };
            localStorage.setItem('kdrawcut_draft', JSON.stringify(draftData));
          }
        }
      }, [segments, overlays, videoUrl, duration]);

      const clearDraft = () => {
        localStorage.removeItem('kdrawcut_draft');
        setHasDraft(false);
        showToastMessage('已清除前次草稿，準備開啟新專案');
      };

      const saveHistory = useCallback((newSegments, newOverlays) => {
        const safeOverlays = newOverlays.map(o => ({...o, imgElement: null}));
        const newState = { 
          segments: JSON.parse(JSON.stringify(newSegments)), 
          overlays: safeOverlays 
        };
        newState.overlays.forEach((o, i) => { o.imgElement = newOverlays[i].imgElement; });

        setHistory(prev => {
          const newHistory = prev.slice(0, historyPointer + 1);
          newHistory.push(newState);
          return newHistory;
        });
        setHistoryPointer(prev => prev + 1);
      }, [historyPointer]);

      const handleUndo = () => {
        if (historyPointer > 0) {
          const prevState = history[historyPointer - 1];
          setSegments(prevState.segments); setOverlays(prevState.overlays);
          setHistoryPointer(historyPointer - 1); setSelectedSegmentId(null); setSelectedOverlayId(null);
        }
      };

      const handleRedo = () => {
        if (historyPointer < history.length - 1) {
          const nextState = history[historyPointer + 1];
          setSegments(nextState.segments); setOverlays(nextState.overlays);
          setHistoryPointer(historyPointer + 1); setSelectedSegmentId(null); setSelectedOverlayId(null);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          setVideoUrl(url); setCurrentTime(0); setHistory([]); setHistoryPointer(-1); setSelectedSegmentId(null); setSelectedOverlayId(null);
        }
      };

      // 🌟 保留的圖片上傳功能
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.src = url;
          img.onload = () => {
            const currentActual = videoRef.current ? videoRef.current.currentTime : 0;
            const currentConceptual = getConceptualTime(currentActual);
            const endConceptual = Math.min(currentConceptual + 3, validDuration);
            
            const newOverlays = [
              ...overlays,
              {
                id: Date.now(), type: 'image', content: url, imgElement: img,
                startTime: currentActual, endTime: getActualTime(endConceptual),
                x: 50, y: 50, size: 80, rotation: 0, animation: 'pop', link: ''
              }
            ];
            setOverlays(newOverlays); saveHistory(segments, newOverlays);
          };
        }
      };

      const handleLoadedMetadata = () => {
        const dur = videoRef.current.duration;
        setDuration(dur);

        const videoWidth = videoRef.current.videoWidth;
        const videoHeight = videoRef.current.videoHeight;
        const canvasWidth = 640; 
        const canvasHeight = (videoHeight / videoWidth) * canvasWidth;
        canvasRef.current.width = canvasWidth; canvasRef.current.height = canvasHeight;

        const draftStr = localStorage.getItem('kdrawcut_draft');
        if (draftStr) {
          try {
            const draft = JSON.parse(draftStr);
            if (Math.abs(draft.duration - dur) < 1) {
              setSegments(draft.segments);
              setOverlays(draft.overlays);
              saveHistory(draft.segments, draft.overlays);
              showToastMessage('✅ 已成功為您恢復上次的編輯進度！(註: 自訂圖片需重新上傳)');
              return; 
            }
          } catch(e) { console.error(e); }
        }

        const initialSegments = [{ id: 'seg-init', start: 0, end: dur, isDeleted: false }];
        setSegments(initialSegments); setOverlays([]); saveHistory(initialSegments, []);
      };

      const handleSplit = () => {
        if (!videoUrl) return;
        const timeNow = currentTime;
        const currentSegIndex = segments.findIndex(s => !s.isDeleted && timeNow > s.start + 0.1 && timeNow < s.end - 0.1);
        if (currentSegIndex === -1) return; 
        
        const targetSeg = segments[currentSegIndex];
        const newSegments = [...segments];
        const seg1 = { id: `seg-${Date.now()}-1`, start: targetSeg.start, end: timeNow, isDeleted: false };

                        ctx.lineWidth = currentSize * 0.25; ctx.strokeStyle = '#000000'; ctx.strokeText(line, 0, yPos); 
                        ctx.lineWidth = currentSize * 0.1; ctx.strokeStyle = '#FFFFFF'; ctx.strokeText(line, 0, yPos); 
                        if (item.color === 'rainbow') {
                           const gradient = ctx.createLinearGradient(-lw/2, 0, lw/2, 0);
                           gradient.addColorStop(0, '#FF003C'); gradient.addColorStop(0.5, '#FFEA00'); gradient.addColorStop(1, '#00F0FF');
                           ctx.fillStyle = gradient;
                        } else { ctx.fillStyle = item.color || '#FFEA00'; }
                        ctx.fillText(line, 0, yPos);
                     } else if (item.templateStyle === 'variety') {
                        ctx.shadowColor = 'transparent'; ctx.lineWidth = currentSize * 0.15; ctx.lineJoin = 'round'; ctx.strokeStyle = '#000000';
                        ctx.strokeText(line, currentSize * 0.08, yPos + currentSize * 0.08); ctx.fillText(line, currentSize * 0.08, yPos + currentSize * 0.08);
                        ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = currentSize * 0.08; ctx.strokeText(line, 0, yPos);
                        if (item.color === 'rainbow') {
                           const gradient = ctx.createLinearGradient(-lw/2, yPos, lw/2, yPos);
                           gradient.addColorStop(0, '#FF003C'); gradient.addColorStop(0.5, '#FFEA00'); gradient.addColorStop(1, '#00F0FF');
                           ctx.fillStyle = gradient;
                        } else {
                           const gradient = ctx.createLinearGradient(0, yPos-currentSize/2, 0, yPos+currentSize/2);
                           gradient.addColorStop(0, '#FFFFFF'); gradient.addColorStop(0.5, item.color || '#FFFFFF'); gradient.addColorStop(1, item.color || '#FFFFFF'); 
                           ctx.fillStyle = gradient;
                        }
                        ctx.fillText(line, 0, yPos);
                     } else {
                        ctx.shadowColor = item.color !== 'rainbow' ? item.color : '#00F0FF'; ctx.shadowBlur = 10; ctx.lineWidth = Math.max(1, currentSize / 15); ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                        ctx.strokeText(line, 0, yPos); 
                        if (item.color === 'rainbow') {
                           const gradient = ctx.createLinearGradient(-lw/2, 0, lw/2, 0);
                           gradient.addColorStop(0, '#FF003C'); gradient.addColorStop(0.5, '#FFEA00'); gradient.addColorStop(1, '#00F0FF');
                           ctx.fillStyle = gradient;
                        } else { ctx.fillStyle = item.color || '#FFFFFF'; }
                        ctx.fillText(line, 0, yPos);
                     }

                     if (item.link && idx === 0) {
                        ctx.fillStyle = '#00F0FF'; ctx.shadowBlur = 5; ctx.shadowColor='#000'; ctx.font = `bold ${currentSize * 0.3}px sans-serif`; ctx.fillText("🔗", lw/2 + paddingX, yPos - currentSize/2); ctx.font = `900 ${currentSize}px ${fontFamily}`; 
                     }
                  });
              }
            }

            if (!isExporting && selectedOverlayId === item.id) {
                const lines = displayText.split('\n');
                let maxW = 0;
                lines.forEach(l => maxW = Math.max(maxW, ctx.measureText(l).width));
                const textW = item.type === 'text' ? maxW : currentSize * 1.2;
                let w = 0, h = 0;
                if (item.type === 'image') {
                   const imgRatio = item.imgElement ? item.imgElement.width / item.imgElement.height : 1;
                   w = currentSize * 2; h = w / imgRatio;
                } else {
                   w = textW + currentSize * 1.2;
                   h = lines.length * (currentSize * 1.2) + currentSize * 1.3;
                }

                ctx.strokeStyle = '#00F0FF'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.strokeRect(-w/2, -h/2, w, h);
                ctx.setLineDash([]); ctx.fillStyle = '#FFFFFF'; ctx.strokeStyle = '#00F0FF'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(w/2, h/2, Math.max(10, currentSize * 0.15), 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -h/2); ctx.lineTo(0, -h/2 - currentSize * 0.8); ctx.stroke();
                ctx.beginPath(); ctx.arc(0, -h/2 - currentSize * 0.8, Math.max(10, currentSize * 0.15), 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            }
            ctx.restore();
          }
        });
        setCurrentTime(video.currentTime);
        animationRef.current = requestAnimationFrame(drawFrame);
      };

      useEffect(() => {
        animationRef.current = requestAnimationFrame(drawFrame);
        return () => cancelAnimationFrame(animationRef.current);
      });

      // 🌟 保留穩定匯出模式 (支援聲音)
      const handleExport = () => {
        if (!videoRef.current || !canvasRef.current) return;
        if (validSegments.length === 0) return alert("沒有可匯出的片段");

        setIsExporting(true); 
        setExportProgress(0); 
        recordedChunksRef.current = [];
        
        const stream = canvasRef.current.captureStream(30);
        if (videoRef.current.captureStream) {
            const audioStream = videoRef.current.captureStream();
            if (audioStream.getAudioTracks().length > 0) stream.addTrack(audioStream.getAudioTracks()[0]);
        }
        mediaRecorderRef.current = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
        mediaRecorderRef.current.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunksRef.current.push(e.data);
        };

        mediaRecorderRef.current.onstop = () => {
          const blob = new Blob(recordedChunksRef.current, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'kdrawcut_video.webm'; a.click();
          URL.revokeObjectURL(url);
          setIsExporting(false); 
          setIsPlaying(false);
          setExportProgress(0);
        };

        let currentSegIndex = 0;
        let exportedTimeAcc = 0; 
        
        videoRef.current.currentTime = validSegments[0].start;
        videoRef.current.play(); 
        mediaRecorderRef.current.start();

        const exportCheck = setInterval(() => {
          if (!videoRef.current) return;
          const currentActualTime = videoRef.current.currentTime;
          const currentSeg = validSegments[currentSegIndex];
          
          let currentProgressTime = exportedTimeAcc + (currentActualTime - currentSeg.start);
          let progressPct = Math.min(99, Math.round((currentProgressTime / validDuration) * 100));
          setExportProgress(progressPct);

          if (currentActualTime >= currentSeg.end) {
            exportedTimeAcc += (currentSeg.end - currentSeg.start);
            currentSegIndex++;
            if (currentSegIndex < validSegments.length) {
              videoRef.current.currentTime = validSegments[currentSegIndex].start;
            } else {
              setExportProgress(100);
              mediaRecorderRef.current.stop(); 
              videoRef.current.pause(); 
              clearInterval(exportCheck);
            }
          }
        }, 50);
      };

      const addOverlay = (type, templateStyle = 'default') => {
        const currentActual = videoRef.current ? videoRef.current.currentTime : 0;
        const currentConceptual = getConceptualTime(currentActual);
        const endConceptual = Math.min(currentConceptual + 3, validDuration);
        
        const defaultText = templateStyle === 'adboard' 
          ? "🎉 限時優惠活動\n👉 點擊下方連結立即參加！" 
          : "CYBER TEXT";

        const newOverlays = [
          ...overlays,
          {
            id: Date.now(), type: type, content: type === 'text' ? defaultText : '🔥', 
            startTime: currentActual, 
            endTime: getActualTime(endConceptual),
            x: 50, y: 50, color: '#FFFFFF', size: type === 'text' ? 40 : 80, rotation: 0, animation: 'pop',
            templateStyle: templateStyle, link: ''
          }
        ];
        setOverlays(newOverlays); saveHistory(segments, newOverlays);

      if (appMode === 'lab') {

                  <span className="text-cyan-400 font-mono text-sm w-12">{getConceptualTime(currentTime).toFixed(1)}s</span>

                <div ref={timelineContainerRef} className="flex-1 overflow-x-auto overflow-y-auto p-4 pt-6 relative select-none touch-pan-x touch-pan-y">

                              <div className="w-full h-1 bg-white/20 mb-1 pointer-events-none"></div>

                          );

                      </div>
                      {overlays.map((item) => {

                        const width = (getConceptualTime(item.endTime) - getConceptualTime(item.startTime)) * zoomLevel;
                        const isSelected = selectedOverlayId === item.id;
                        return (

                              <div className="w-5 h-full cursor-ew-resize flex items-center justify-center bg-black/20 rounded-l shrink-0" onPointerDown={(e) => handleOverlayTrackPointerDown(e, item.id, 'trimLeft')} onPointerMove={handleOverlayTrackPointerMove} onPointerUp={handleOverlayTrackPointerUp} onPointerCancel={handleOverlayTrackPointerUp}>
                                <div className="w-1 h-3 bg-white/70 rounded-full pointer-events-none"></div>
                              </div>
                              <div className="flex-1 h-full flex items-center justify-center cursor-move overflow-hidden px-1" onPointerDown={(e) => handleOverlayTrackPointerDown(e, item.id, 'move')} onPointerMove={handleOverlayTrackPointerMove} onPointerUp={handleOverlayTrackPointerUp} onPointerCancel={handleOverlayTrackPointerUp}>
                                <span className="text-[10px] text-black font-bold truncate drop-shadow-sm pointer-events-none">{item.type === 'image' ? '🖼️ 自訂圖片' : item.content}</span>
                              </div>
                              <div className="w-5 h-full cursor-ew-resize flex items-center justify-center bg-black/20 rounded-r shrink-0" onPointerDown={(e) => handleOverlayTrackPointerDown(e, item.id, 'trimRight')} onPointerMove={handleOverlayTrackPointerMove} onPointerUp={handleOverlayTrackPointerUp} onPointerCancel={handleOverlayTrackPointerUp}>
                                <div className="w-1 h-3 bg-white/70 rounded-full pointer-events-none"></div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                    <div className="p-2 bg-slate-800 rounded-xl shadow-inner"><Type size={18} /></div><span className="text-[10px] font-medium tracking-wide">加文字</span>
                  </button>
                  {/* 🌟 補回廣告看板按鈕 */}
                  <button onClick={() => addOverlay('text', 'adboard')} className="flex flex-col items-center gap-1.5 text-green-400 hover:text-green-300 transition-colors shrink-0 px-2">
                    <div className="p-2 bg-green-900/40 border border-green-500/50 rounded-xl shadow-inner shadow-green-900/50"><LayoutTemplate size={18} /></div><span className="text-[10px] font-medium tracking-wide">廣告看板</span>
                  </button>
                  {/* 🌟 補回加圖片 (自訂貼圖) 按鈕 */}
                  <label className="flex flex-col items-center gap-1.5 text-indigo-400 hover:text-indigo-300 transition-colors shrink-0 px-2 cursor-pointer">
                    <div className="p-2 bg-indigo-900/40 border border-indigo-500/50 rounded-xl shadow-inner shadow-indigo-900/50"><ImageIcon size={18} /></div><span className="text-[10px] font-medium tracking-wide">加圖片</span>
                    <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                  </label>
                  <button onClick={() => addOverlay('sticker')} className="flex flex-col items-center gap-1.5 text-slate-400 hover:text-cyan-400 transition-colors shrink-0 px-2">
                    <div className="p-2 bg-slate-800 rounded-xl shadow-inner"><SmilePlus size={18} /></div><span className="text-[10px] font-medium tracking-wide">加表情</span>
                  </button>
                  <button onClick={handleDeleteSegment} disabled={!selectedSegmentId} className={`flex flex-col items-center gap-1.5 transition-colors shrink-0 px-2 ${selectedSegmentId ? 'text-red-400' : 'text-slate-700'}`}>
                    <div className={`p-2 rounded-xl shadow-inner ${selectedSegmentId ? 'bg-red-500/10 border border-red-500/30' : 'bg-slate-800'}`}><Trash2 size={18} /></div><span className="text-[10px] font-medium tracking-wide">刪片段</span>
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 pb-24 space-y-4">
                  {overlays.length === 0 && <div className="text-center text-slate-500 text-sm mt-4">點擊上方按鈕新增文字或表情</div>}
                  {overlays.map(item => (
                    <div key={item.id} className={`bg-slate-950/50 border p-4 rounded-xl relative overflow-hidden shadow-md transition-all ${selectedOverlayId === item.id ? 'border-cyan-500 shadow-[0_0_15px_rgba(34,211,238,0.2)]' : 'border-slate-800'}`} onClick={() => setSelectedOverlayId(item.id)}>
                      <div className={`absolute top-0 left-0 w-1 h-full ${item.type === 'text' ? 'bg-yellow-500' : item.type === 'image' ? 'bg-indigo-500' : 'bg-pink-500'}`}></div>
                      
                      <div className="flex justify-between items-center mb-3">
                        <span className="text-xs font-bold text-slate-500 bg-slate-900 px-2 py-1 rounded">
                          {item.type === 'text' ? (item.templateStyle === 'adboard' ? '📢 廣告看板' : item.templateStyle !== 'default' ? '🎨 自訂模版' : '📝 文字圖層') : item.type === 'image' ? '🖼️ 圖片圖層' : '✨ 貼圖圖層'}
                        </span>
                        <button onClick={(e) => {
                          e.stopPropagation();
                          const newOverlays = overlays.filter(t => t.id !== item.id);
                          setOverlays(newOverlays); saveHistory(segments, newOverlays);
                        }} className="text-red-500 p-1.5 bg-red-500/10 rounded-md hover:bg-red-500/20"><Trash2 size={16}/></button>
                      </div>

                      {item.type === 'image' && (
                         <div className="mb-3 text-[10px] text-slate-400 bg-slate-900 p-2 rounded">
                            ✅ 圖片已成功載入，可直接在預覽畫面上拖曳與縮放。
                         </div>
                      )}

                      {(item.type === 'text' || item.type === 'sticker') && (
                        <div className="flex gap-2 mb-3">
                          {item.type === 'text' ? (
                            <textarea value={item.content} onChange={(e) => {
                                const newOverlays = overlays.map(t => t.id === item.id ? { ...t, content: e.target.value } : t);
                                setOverlays(newOverlays); saveHistory(segments, newOverlays);
                              }} className="flex-1 bg-slate-900 text-white font-bold border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400 transition shadow-inner resize-none h-20" placeholder="支援輸入多行文字... \n自動換行效果" />
                          ) : (
                            <input type="text" value={item.content} onChange={(e) => {
                                const newOverlays = overlays.map(t => t.id === item.id ? { ...t, content: e.target.value } : t);
                                setOverlays(newOverlays); saveHistory(segments, newOverlays);
                              }} className="flex-1 bg-slate-900 text-white font-bold border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400 transition shadow-inner" placeholder="輸入Emoji" />
                          )}
                        </div>
                      )}

                      {item.type === 'text' && (
                        <div className="mb-4">
                           <span className="text-[10px] text-slate-500 block mb-2 block">快速填色 / 彩虹特效 (文字本體)</span>
                           <div className="flex gap-3 overflow-x-auto pb-2 snap-x">
                              {['#FFFFFF', '#000000', '#FF003C', '#FF9A00', '#FFEA00', '#00FF00', '#00F0FF', '#0000FF', '#A200FF', 'rainbow'].map(c => (
                                 <button
                                   key={c}
                                   onClick={() => {
                                      const newOverlays = overlays.map(t => t.id === item.id ? { ...t, color: c } : t);
                                      setOverlays(newOverlays); saveHistory(segments, newOverlays);
                                   }}
                                   className={`w-8 h-8 rounded-full shrink-0 border-2 shadow-sm transition-transform snap-center ${item.color === c ? 'border-white scale-110 shadow-[0_0_10px_rgba(255,255,255,0.5)]' : 'border-slate-700 hover:scale-105'}`}
                                   style={{ background: c === 'rainbow' ? 'linear-gradient(to right, #FF003C, #FFEA00, #00F0FF)' : c }}
                                 />
                              ))}
                              <div className="relative w-8 h-8 rounded-full shrink-0 overflow-hidden border-2 border-slate-700 snap-center shadow-inner bg-slate-800 flex items-center justify-center">
                                <span className="text-xs">🎨</span>
                                <input type="color" value={item.color && item.color !== 'rainbow' ? item.color : '#FFFFFF'} onChange={(e) => {
                                    const newOverlays = overlays.map(t => t.id === item.id ? { ...t, color: e.target.value } : t);
                                    setOverlays(newOverlays); saveHistory(segments, newOverlays);
                                  }} className="absolute -inset-4 w-[200%] h-[200%] cursor-pointer opacity-0" />
                              </div>
                           </div>
                        </div>
                      )}

                      <div className="flex items-center gap-2 mb-4 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 focus-within:border-cyan-400 transition">
                         <LinkIcon size={16} className="text-slate-400" />
                         <input type="text" value={item.link || ''} onChange={(e) => {
                             const newOverlays = overlays.map(t => t.id === item.id ? { ...t, link: e.target.value } : t);
                             setOverlays(newOverlays); saveHistory(segments, newOverlays);
                           }} className="flex-1 bg-transparent text-white text-xs focus:outline-none" placeholder="🔗 綁定連結 (例如: https://...)" />
                      </div>

                      {item.type === 'text' && (
                        <div className="mb-4">
                           <span className="text-[10px] text-slate-500 block mb-1">套用模版</span>
                           <div className="flex flex-wrap gap-2">
                              <button onClick={() => {
                                  const newOverlays = overlays.map(t => t.id === item.id ? { ...t, templateStyle: 'default' } : t);
                                  setOverlays(newOverlays); saveHistory(segments, newOverlays);
                                }}
                                className={`py-1.5 px-2 text-[10px] rounded border transition ${item.templateStyle === 'default' ? 'bg-cyan-900/40 border-cyan-400 text-cyan-300' : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'}`}
                              >
                                基礎無底框
                              </button>
                              {[
                                {id: 'cyberpunk', name: '科技霓虹'}, 
                                {id: 'comic', name: '美漫爆發'},
                                ...customTemplates.map(t => ({id: t.id, name: t.name}))
                              ].map(style => (
                                <button key={style.id} onClick={() => {
                                    const newOverlays = overlays.map(t => t.id === item.id ? { ...t, templateStyle: style.id } : t);
                                    setOverlays(newOverlays); saveHistory(segments, newOverlays);
                                  }}
                                  className={`py-1.5 px-2 text-[10px] rounded border transition ${item.templateStyle === style.id ? (style.id.startsWith('custom_') ? 'bg-pink-900/40 border-pink-400 text-pink-300' : 'bg-cyan-900/40 border-cyan-400 text-cyan-300') : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'}`}
                                >
                                  {style.name}
                                </button>
                              ))}
                           </div>
                        </div>
                      )}

                      <div className="grid grid-cols-4 gap-2 mb-4">
                        {['none', 'fade', 'pop', item.type==='text' ? 'typewriter' : 'slideUp'].map(anim => (
                          <button key={anim} onClick={() => {
                              const newOverlays = overlays.map(t => t.id === item.id ? { ...t, animation: anim } : t);
                              setOverlays(newOverlays); saveHistory(segments, newOverlays);
                            }}
                            className={`py-1.5 text-[10px] rounded border transition ${item.animation === anim ? 'bg-cyan-900/40 border-cyan-400 text-cyan-300' : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'}`}
                          >
                            {anim === 'none' ? '無特效' : anim === 'fade' ? '淡入' : anim === 'pop' ? '彈出' : anim === 'slideUp' ? '上滑' : '打字機'}
                          </button>
                        ))}
                      </div>

                    </div>
                  ))}
                </div>
              </div>
            </main>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<MobileTechVideoEditor />);
  </script>
</body>
</html>
