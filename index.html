<html lang="zh-TW">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KDrawCUT - 手機版科技感影片編輯器</title>

  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  
  <meta name="apple-mobile-web-app-capable" content="yes">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

      "imports": {
        "react": "https://esm.sh/react@18.2.0",

<body>
  <div id="root">
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#22d3ee; font-family:sans-serif; background-color:#020617;">
      <div style="width:50px; height:50px; border:4px solid #0891b2; border-top-color:#22d3ee; border-radius:50%; animation:kdrawcut-spin 1s linear infinite; margin-bottom:20px;"></div>
      <h3 style="letter-spacing: 2px; font-weight: bold;">啟動 KDrawCUT 引擎...</h3>
      <p style="color:#64748b; font-size:12px; margin-top:10px;">首次載入可能需要幾秒鐘</p>
    </div>
  </div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Upload, Play, Pause, Download, Plus, Trash2, Type, Scissors, Undo2, Redo2, LayoutPanelTop, SmilePlus, LayoutTemplate, Palette, Save, ArrowLeft, Image as ImageIcon, Link as LinkIcon } from 'lucide-react';

    const loadFonts = () => {
      if (!document.getElementById('kdrawcut-fonts')) {
        const link = document.createElement('link');
        link.id = 'kdrawcut-fonts';
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Bangers&family=Dela+Gothic+One&family=Noto+Sans+TC:wght@400;900&family=Noto+Serif+TC:wght@600;900&family=Orbitron:wght@900&family=Mochiy+Pop+One&family=Potta+One&family=Zen+Maru+Gothic:wght@900&display=swap';
        document.head.appendChild(link);
      }
    };

    function TemplateLab({ onBack, customTemplates, setCustomTemplates, showToastMessage }) {
      const [tpl, setTpl] = useState({
        name: '我的專屬模版', fontFamily: '"Noto Sans TC", sans-serif', color: '#FFFFFF', useGradient: false, gradientColor2: '#00F0FF', strokeColor: '#000000', strokeWidth: 4, strokeColor2: '#FFFFFF', strokeWidth2: 0, boxStyle: 'none', boxColor: 'rgba(15, 23, 42, 0.8)', icon: 'none', shadow: true,
      });

      const previewCanvasRef = useRef(null);
      const animationRef = useRef(null);

      const renderPreview = () => {
        if (!previewCanvasRef.current) return;
        const ctx = previewCanvasRef.current.getContext('2d');
        const canvas = previewCanvasRef.current;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for(let i=0; i<canvas.width; i+=20) { ctx.fillStyle = 'rgba(255,255,255,0.02)'; ctx.fillRect(i, 0, 1, canvas.height); ctx.fillRect(0, i, canvas.width, 1); }

        const currentSize = 45;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        let displayText = '訂閱 KDrawCUT';
        if (tpl.icon === 'bell') displayText = '🔔 ' + displayText;
        if (tpl.icon === 'like') displayText = '👍 ' + displayText;
        if (tpl.icon === 'star') displayText = '⭐ ' + displayText;

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.font = `900 ${currentSize}px ${tpl.fontFamily}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        const textWidth = ctx.measureText(displayText).width;
        const paddingX = currentSize * 0.8; const paddingY = currentSize * 0.5;
        const bw = textWidth + paddingX * 2; const bh = currentSize + paddingY * 2;

        if (tpl.boxStyle !== 'none') {
           ctx.fillStyle = tpl.boxColor; ctx.beginPath();
           if (tpl.boxStyle === 'cyber') { ctx.moveTo(-bw/2 + 10, -bh/2); ctx.lineTo(bw/2, -bh/2); ctx.lineTo(bw/2 - 10, bh/2); ctx.lineTo(-bw/2, bh/2); ctx.fill(); }
           else if (tpl.boxStyle === 'pill') { if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, currentSize); else ctx.fillRect(-bw/2, -bh/2, bw, bh); ctx.fill(); }
           else if (tpl.boxStyle === 'bubble') { if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, 15); else ctx.fillRect(-bw/2, -bh/2, bw, bh); ctx.fill(); ctx.beginPath(); ctx.moveTo(-10, bh/2); ctx.lineTo(10, bh/2); ctx.lineTo(0, bh/2 + 15); ctx.fill(); }
           else if (tpl.boxStyle === 'glass') { ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; if (ctx.roundRect) ctx.roundRect(-bw/2, -bh/2, bw, bh, 20); else ctx.fillRect(-bw/2, -bh/2, bw, bh); ctx.fill(); ctx.stroke(); }
           else if (tpl.boxStyle === 'ribbon') { ctx.moveTo(-bw/2, -bh/2); ctx.lineTo(bw/2, -bh/2); ctx.lineTo(bw/2 - 20, 0); ctx.lineTo(bw/2, bh/2); ctx.lineTo(-bw/2, bh/2); ctx.lineTo(-bw/2 + 20, 0); ctx.fill(); }
           else if (tpl.boxStyle === 'tape') { ctx.save(); ctx.rotate(-2 * Math.PI / 180); ctx.fillStyle = tpl.boxColor || 'rgba(255, 250, 200, 0.85)'; ctx.fillRect(-bw/2 - 10, -bh/2, bw + 20, bh); ctx.restore(); }
           else if (tpl.boxStyle === 'neon') { ctx.shadowBlur = 15; ctx.shadowColor = tpl.boxColor; ctx.strokeStyle = tpl.boxColor; ctx.lineWidth = 3; ctx.strokeRect(-bw/2, -bh/2, bw, bh); ctx.shadowBlur = 0; }
        }

        if (tpl.shadow) { ctx.shadowColor = tpl.color; ctx.shadowBlur = 15; } else { ctx.shadowBlur = 0; }
        if (tpl.strokeWidth2 > 0) { ctx.lineWidth = tpl.strokeWidth + tpl.strokeWidth2 * 2; ctx.strokeStyle = tpl.strokeColor2; ctx.lineJoin = 'round'; ctx.strokeText(displayText, 0, 0); }
        if (tpl.strokeWidth > 0) { ctx.lineWidth = tpl.strokeWidth; ctx.strokeStyle = tpl.strokeColor; ctx.lineJoin = 'round'; ctx.strokeText(displayText, 0, 0); }

        if (tpl.useGradient) { const gradient = ctx.createLinearGradient(0, -currentSize/2, 0, currentSize/2); gradient.addColorStop(0, tpl.color); gradient.addColorStop(1, tpl.gradientColor2); ctx.fillStyle = gradient; }
        else { ctx.fillStyle = tpl.color; }
        
        ctx.fillText(displayText, 0, 0); ctx.restore();
        animationRef.current = requestAnimationFrame(renderPreview);
      };

      useEffect(() => { animationRef.current = requestAnimationFrame(renderPreview); return () => cancelAnimationFrame(animationRef.current); }, [tpl]);

        const newTpl = { ...tpl, id: `custom_${Date.now()}` };
        const updatedList = [...customTemplates, newTpl];
        setCustomTemplates(updatedList);

            <div className="grid grid-cols-2 gap-4">
              <div className="space-y-2"><label className="text-xs font-bold text-slate-400">字型風格</label><select value={tpl.fontFamily} onChange={e=>setTpl({...tpl, fontFamily:e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-pink-500 focus:outline-none"><option value='"Noto Sans TC", sans-serif'>標準字體</option><option value='"Dela Gothic One", sans-serif'>綜藝特黑 (Dela)</option><option value='"Zen Maru Gothic", sans-serif'>日系圓體 (Zen)</option><option value='"Mochiy Pop One", sans-serif'>可愛膨脹 (Mochiy)</option><option value='"Potta One", sans-serif'>麥克筆手寫 (Potta)</option><option value='"Orbitron", "Noto Sans TC", sans-serif'>科幻機械 (Orbitron)</option><option value='"Bangers", "Dela Gothic One", sans-serif'>美漫爆發 (Bangers)</option><option value='"Noto Serif TC", "BiauKai", "KaiTi", serif'>古風毛筆 / 襯線</option></select></div>
              <div className="space-y-2"><label className="text-xs font-bold text-slate-400">前綴圖示</label><select value={tpl.icon} onChange={e=>setTpl({...tpl, icon:e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-pink-500 focus:outline-none"><option value="none">無圖示</option><option value="bell">🔔 小鈴鐺</option><option value="like">👍 按讚</option><option value="star">⭐ 星星</option></select></div>
            </div>

            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-4">
               <div className="flex justify-between items-center"><label className="text-xs font-bold text-pink-300">文字本體顏色</label><label className="flex items-center gap-2 text-xs text-slate-400"><input type="checkbox" checked={tpl.useGradient} onChange={e=>setTpl({...tpl, useGradient: e.target.checked})} className="accent-pink-500" />啟用漸層色</label></div>
               <div className="flex gap-4"><input type="color" value={tpl.color} onChange={e=>setTpl({...tpl, color:e.target.value})} className="w-full h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1" />{tpl.useGradient && (<input type="color" value={tpl.gradientColor2} onChange={e=>setTpl({...tpl, gradientColor2:e.target.value})} className="w-full h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1" />)}</div>
               <label className="flex items-center gap-2 text-xs text-slate-400 pt-2 border-t border-slate-800"><input type="checkbox" checked={tpl.shadow} onChange={e=>setTpl({...tpl, shadow:e.target.checked})} className="accent-pink-500 w-4 h-4" /><span>開啟文字發光 (霓虹光暈效果)</span></label>
            </div>

            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-4">
              <label className="text-xs font-bold text-pink-300">文字描邊 (支援雙層)</label>
              <div className="flex items-center gap-3"><input type="color" value={tpl.strokeColor} onChange={e=>setTpl({...tpl, strokeColor:e.target.value})} className="w-10 h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1 shrink-0" /><div className="flex-1"><span className="text-[10px] text-slate-400 mb-1 block">內邊框粗細 ({tpl.strokeWidth}px)</span><input type="range" min="0" max="25" value={tpl.strokeWidth} onChange={e=>setTpl({...tpl, strokeWidth:parseInt(e.target.value)})} className="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-pink-500" /></div></div>
              <div className="flex items-center gap-3 pt-2 border-t border-slate-800/50"><input type="color" value={tpl.strokeColor2} onChange={e=>setTpl({...tpl, strokeColor2:e.target.value})} className="w-10 h-10 rounded-lg cursor-pointer bg-slate-950 border border-slate-700 p-1 shrink-0" /><div className="flex-1"><span className="text-[10px] text-slate-400 mb-1 block">外邊框粗細 ({tpl.strokeWidth2}px)</span><input type="range" min="0" max="25" value={tpl.strokeWidth2} onChange={e=>setTpl({...tpl, strokeWidth2:parseInt(e.target.value)})} className="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-pink-500" /></div></div>
            </div>

            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
              <label className="text-xs font-bold text-pink-300">文字底框形狀</label>
              <div className="grid grid-cols-4 gap-2">
                {['none', 'cyber', 'pill', 'bubble', 'glass', 'ribbon', 'tape', 'neon'].map(style => (<button key={style} onClick={()=>setTpl({...tpl, boxStyle: style})} className={`py-2 text-[10px] rounded border transition flex flex-col items-center justify-center gap-1 ${tpl.boxStyle === style ? 'bg-pink-900/40 border-pink-500 text-pink-300 shadow-[0_0_10px_rgba(219,39,119,0.3)]' : 'bg-slate-950 border-slate-700 text-slate-400 hover:bg-slate-800'}`}>{style === 'none' ? '無底框' : style === 'cyber' ? '科技斜切' : style === 'pill' ? '甜美圓角' : style === 'bubble' ? '對話氣泡' : style === 'glass' ? '毛玻璃' : style === 'ribbon' ? '緞帶標籤' : style === 'tape' ? '紙膠帶' : '霓虹框'}</button>))}
              </div>
              {tpl.boxStyle !== 'none' && tpl.boxStyle !== 'glass' && (<div className="flex items-center gap-3 pt-3"><span className="text-xs font-bold text-slate-400">底框顏色</span><input type="color" value={tpl.boxColor.length === 7 ? tpl.boxColor : '#0f172a'} onChange={e=>setTpl({...tpl, boxColor:e.target.value})} className="w-full h-8 rounded cursor-pointer bg-slate-950 border border-slate-700 p-0.5" /></div>)}
            </div>
          </div>
        </div>
      );
    }

    // ================== 🌟 主應用程式 ==================
    function MobileTechVideoEditor() {

      const mediaRecorderRef = useRef(null);

      const showToastMessage = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

      const saveHistory = useCallback((newSegments, newOverlays) => {
        const safeOverlays = newOverlays.map(o => ({...o, imgElement: null}));
        const newState = { segments: JSON.parse(JSON.stringify(newSegments)), overlays: safeOverlays };
        newState.overlays.forEach((o, i) => { o.imgElement = newOverlays[i].imgElement; });

        setHistory(prev => { const newHistory = prev.slice(0, historyPointer + 1); newHistory.push(newState); return newHistory; });
        setHistoryPointer(prev => prev + 1);
      }, [historyPointer]);

      const handleUndo = () => {
        if (historyPointer > 0) {
          const prevState = history[historyPointer - 1];
          setSegments(prevState.segments); setOverlays(prevState.overlays);
          setHistoryPointer(historyPointer - 1); setSelectedSegmentId(null); setSelectedOverlayId(null);
        }

          const nextState = history[historyPointer + 1];

      const handleFileUpload = (e) => {

            const currentConceptual = getConceptualTime(currentActual);

            const stagger = (overlays.length % 5) * 6;
            const newOverlays = [...overlays, { id: Date.now(), type: 'image', content: url, imgElement: img, startTime: currentActual, endTime: getActualTime(endConceptual), x: 50 + (overlays.length > 0 ? (stagger - 12) : 0), y: 50 + (overlays.length > 0 ? (stagger - 12) : 0), size: 80, rotation: 0, animation: 'pop', link: '' }];
            setOverlays(newOverlays); saveHistory(segments, newOverlays);

      const handleLoadedMetadata = () => {

        const canvasWidth = 640; const canvasHeight = (videoHeight / videoWidth) * canvasWidth;
        canvasRef.current.width = canvasWidth; canvasRef.current.height = canvasHeight;

        if (currentSegIndex === -1) return; 
        
        const targetSeg = segments[currentSegIndex]; const newSegments = [...segments];
        const seg1 = { id: `seg-${Date.now()}-1`, start: targetSeg.start, end: timeNow, isDeleted: false };
        const seg2 = { id: `seg-${Date.now()}-2`, start: timeNow, end: targetSeg.end, isDeleted: false };

      const getConceptualTime = (actualTime) => {
        let conceptual = 0;
        for (let seg of validSegments) {
          if (actualTime < seg.start) break;
          if (actualTime >= seg.start && actualTime <= seg.end) return conceptual + (actualTime - seg.start);

        let acc = 0;

          if (conceptualTime <= acc + dur) return seg.start + (conceptualTime - acc);
          acc += dur;
        }
        return validSegments.length ? validSegments[validSegments.length - 1].end : 0;
      };

      const getOverlayDimensions = (item, ctx) => {
          let w = 0; let h = 0;
          if (item.type === 'image') {
             const imgRatio = item.imgElement ? item.imgElement.width / item.imgElement.height : 1;
             w = item.size * 2; h = w / imgRatio;
          } else {
            let fontFamily = '"Noto Sans TC", sans-serif';
            const fontMap = { 'cyberpunk': '"Orbitron", "Noto Sans TC", sans-serif', 'variety_pop': '"Dela Gothic One", sans-serif', 'comic': '"Bangers", "Dela Gothic One", sans-serif', 'vlog_daily': '"Zen Maru Gothic", sans-serif', 'cute_pet': '"Mochiy Pop One", sans-serif', 'movie_intro': '"Noto Serif TC", serif', 'promo': '"Dela Gothic One", sans-serif', 'retro_vhs': '"Courier New", monospace', 'subtitle_bar': '"Noto Sans TC", sans-serif', 'gufeng': '"BiauKai", "DFKai-SB", "KaiTi", "Noto Serif TC", serif' };

            if (item.templateStyle?.startsWith('custom_')) { const tplData = customTemplates.find(t => t.id === item.templateStyle); if(tplData) fontFamily = tplData.fontFamily; } 
            else if (fontMap[item.templateStyle]) { fontFamily = fontMap[item.templateStyle]; }
            
            ctx.font = `900 ${item.size}px ${fontFamily}`;
            const lines = item.content.split('\n');

            if (item.templateStyle === 'gufeng') {
               const maxChars = Math.max(...lines.map(l => l.length));
               w = lines.length * (item.size * 1.5); h = maxChars * (item.size * 1.1) + item.size;
            } else {
               let maxW = 0; lines.forEach(l => maxW = Math.max(maxW, ctx.measureText(l).width));
               w = maxW + item.size * 1.2; h = lines.length * (item.size * 1.2) + item.size * 1.3;
            }
          }
          return { w, h };
      };

      const handleCanvasPointerDown = (e) => {
        if (!canvasRef.current || !videoRef.current || overlays.length === 0) return;
        const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        const pointerX = (e.clientX - rect.left) * scaleX; const pointerY = (e.clientY - rect.top) * scaleY;
        const timeNow = currentTime; const ctx = canvas.getContext('2d'); let hitId = null;

        for (let i = overlays.length - 1; i >= 0; i--) {
          const item = overlays[i];
          if (timeNow >= item.startTime && timeNow <= item.endTime) {
            const centerX = canvas.width * (item.x / 100); const centerY = canvas.height * (item.y / 100);
            const theta = (item.rotation || 0) * Math.PI / 180;
            const dx = pointerX - centerX; const dy = pointerY - centerY;
            const localX = dx * Math.cos(-theta) - dy * Math.sin(-theta); const localY = dx * Math.sin(-theta) + dy * Math.cos(-theta);

            const scaleHandleDist = Math.hypot(localX - w/2, localY - h/2); const rotateHandleDist = Math.hypot(localX - 0, localY - (-h/2 - item.size * 0.8));
            const handleRadius = Math.max(30, item.size * 0.4);

              if (scaleHandleDist <= handleRadius) { setDraggingOverlayId(item.id); setDragAction('scale'); setDragOffset({ initDist: Math.hypot(dx, dy), initSize: item.size }); e.currentTarget.setPointerCapture(e.pointerId); return; }

                  <button onClick={handleDeleteSegment} disabled={!selectedSegmentId} className={`flex flex-col items-center gap-1.5 transition-colors shrink-0 px-2 ${selectedSegmentId ? 'text-red-400' : 'text-slate-700'}`}><div className={`p-2 rounded-xl shadow-inner ${selectedSegmentId ? 'bg-red-500/10 border border-red-500/30' : 'bg-slate-800'}`}><Trash2 size={18} /></div><span className="text-[10px] font-medium tracking-wide">刪片段</span></button>
                </div>

                {/* 3. 屬性面板塊 */}
                <div className="bg-slate-900 p-4 space-y-3 pb-[100px] w-full shrink-0">
                  {overlays.length === 0 && <div className="text-center text-slate-500 text-sm mt-4">點擊上方按鈕新增文字或表情</div>}
                  
                  {overlays.map(item => {
                    const isSelected = selectedOverlayId === item.id;
                    return (
                      <div key={item.id} className={`bg-slate-950/50 border rounded-xl relative overflow-hidden transition-all cursor-pointer ${isSelected ? 'border-cyan-500 shadow-[0_0_15px_rgba(34,211,238,0.2)] p-4' : 'border-slate-800 hover:border-slate-700 p-3'}`} onClick={() => setSelectedOverlayId(item.id)}>
                        <div className={`absolute top-0 left-0 w-1 h-full ${item.type === 'text' ? 'bg-yellow-500' : item.type === 'image' ? 'bg-indigo-500' : 'bg-pink-500'}`}></div>
                        
                        <div className="flex justify-between items-center">
                          <div className="flex items-center gap-3 w-full">
                            <span className="text-xs font-bold text-slate-500 bg-slate-900 px-2 py-1 rounded shrink-0">
                              {item.type === 'text' ? (item.templateStyle === 'adboard' ? '📢 看板' : item.templateStyle !== 'default' ? '🎨 模版' : '📝 文字') : item.type === 'image' ? '🖼️ 圖片' : '✨ 貼圖'}
                            </span>
                            {!isSelected && (
                              <span className="text-xs text-slate-400 truncate flex-1 block">
                                {item.type === 'image' ? '自訂圖片' : item.content.replace(/\n/g, ' ')}
                              </span>
                            )}
                          </div>
                          <button onClick={(e) => {
                            e.stopPropagation();
                            const newOverlays = overlays.filter(t => t.id !== item.id);
                            setOverlays(newOverlays); saveHistory(segments, newOverlays);
                          }} className="text-red-500 p-1.5 bg-red-500/10 rounded-md hover:bg-red-500/20 shrink-0 ml-2"><Trash2 size={16}/></button>
                        </div>

                        {isSelected && (
                          <div className="mt-4 animate-in fade-in slide-in-from-top-2 duration-200 cursor-default" onClick={e => e.stopPropagation()}>
                            {item.type === 'image' && (<div className="mb-3 text-[10px] text-slate-400 bg-slate-900 p-2 rounded">✅ 圖片已成功載入，可直接在預覽畫面上拖曳與縮放。</div>)}
                            {(item.type === 'text' || item.type === 'sticker') && (
                              <div className="flex gap-2 mb-3">
                                {item.type === 'text' ? (
                                  <textarea value={item.content} onChange={(e) => { const newOverlays = overlays.map(t => t.id === item.id ? { ...t, content: e.target.value } : t); setOverlays(newOverlays); saveHistory(segments, newOverlays); }} className="flex-1 bg-slate-900 text-white font-bold border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400 transition shadow-inner resize-none h-20" placeholder="支援輸入多行文字... \n自動換行效果" />
                                ) : (
                                  <input type="text" value={item.content} onChange={(e) => { const newOverlays = overlays.map(t => t.id === item.id ? { ...t, content: e.target.value } : t); setOverlays(newOverlays); saveHistory(segments, newOverlays); }} className="flex-1 bg-slate-900 text-white font-bold border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-400 transition shadow-inner" placeholder="輸入Emoji" />
                                )}
                              </div>
                            )}

                            {item.type === 'text' && (
                              <div className="mb-4">
                                 <span className="text-[10px] text-slate-500 block mb-2 block">快速填色 / 彩虹特效 (文字本體)</span>
                                 <div className="flex gap-3 overflow-x-auto pb-2 snap-x">
                                    {['#FFFFFF', '#000000', '#FF003C', '#FF9A00', '#FFEA00', '#00FF00', '#00F0FF', '#0000FF', '#A200FF', 'rainbow'].map(c => (
                                       <button key={c} onClick={() => { const newOverlays = overlays.map(t => t.id === item.id ? { ...t, color: c } : t); setOverlays(newOverlays); saveHistory(segments, newOverlays); }} className={`w-8 h-8 rounded-full shrink-0 border-2 shadow-sm transition-transform snap-center ${item.color === c ? 'border-white scale-110 shadow-[0_0_10px_rgba(255,255,255,0.5)]' : 'border-slate-700 hover:scale-105'}`} style={{ background: c === 'rainbow' ? 'linear-gradient(to right, #FF003C, #FFEA00, #00F0FF)' : c }} />
                                    ))}
                                    <div className="relative w-8 h-8 rounded-full shrink-0 overflow-hidden border-2 border-slate-700 snap-center shadow-inner bg-slate-800 flex items-center justify-center">
                                      <span className="text-xs">🎨</span>
                                      <input type="color" value={item.color && item.color !== 'rainbow' ? item.color : '#FFFFFF'} onChange={(e) => { const newOverlays = overlays.map(t => t.id === item.id ? { ...t, color: e.target.value } : t); setOverlays(newOverlays); saveHistory(segments, newOverlays); }} className="absolute -inset-4 w-[200%] h-[200%] cursor-pointer opacity-0" />
                                    </div>
                                 </div>
                              </div>
                            )}

                            <div className="flex items-center gap-2 mb-4 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 focus-within:border-cyan-400 transition">
                               <LinkIcon size={16} className="text-slate-400" />
                               <input type="text" value={item.link || ''} onChange={(e) => { const newOverlays = overlays.map(t => t.id === item.id ? { ...t, link: e.target.value } : t); setOverlays(newOverlays); saveHistory(segments, newOverlays); }} className="flex-1 bg-transparent text-white text-xs focus:outline-none" placeholder="🔗 綁定連結 (例如: https://...)" />
                            </div>

                            {item.type === 'text' && (
                              <div className="mb-4">
                                 <span className="text-[10px] text-slate-500 block mb-1">套用模版風格</span>
                                 <div className="flex flex-wrap gap-2">
                                    {[
                                      {id: 'default', name: '基礎無底框'}, {id: 'adboard', name: '📢 廣告看板'}, {id: 'variety_pop', name: '📺 綜藝大字'}, {id: 'subtitle_bar', name: '💬 專業字幕條'}, {id: 'gufeng', name: '📜 古風水墨'}, {id: 'promo', name: '🔥 爆款促銷'}, {id: 'cute_pet', name: '🐾 可愛萌寵'}, {id: 'vlog_daily', name: '📝 質感日常'}, {id: 'movie_intro', name: '🎬 電影開場'}, {id: 'cyberpunk', name: '⚡ 科技霓虹'}, {id: 'comic', name: '💥 美漫爆發'}, {id: 'retro_vhs', name: '📼 復古VHS'}, ...customTemplates.map(t => ({id: t.id, name: t.name}))
                                    ].map(style => (
                                      <button key={style.id} onClick={() => { const newOverlays = overlays.map(t => t.id === item.id ? { ...t, templateStyle: style.id } : t); setOverlays(newOverlays); saveHistory(segments, newOverlays); }} className={`py-1.5 px-2 text-[10px] rounded border transition ${item.templateStyle === style.id ? (style.id.startsWith('custom_') ? 'bg-pink-900/40 border-pink-400 text-pink-300' : 'bg-cyan-900/40 border-cyan-400 text-cyan-300') : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'}`}>{style.name}</button>
                                    ))}
                                 </div>
                              </div>
                            )}

                            <div className="grid grid-cols-4 gap-2">
                              {['none', 'fade', 'pop', item.type==='text' ? 'typewriter' : 'slideUp'].map(anim => (
                                <button key={anim} onClick={() => { const newOverlays = overlays.map(t => t.id === item.id ? { ...t, animation: anim } : t); setOverlays(newOverlays); saveHistory(segments, newOverlays); }} className={`py-1.5 text-[10px] rounded border transition ${item.animation === anim ? 'bg-cyan-900/40 border-cyan-400 text-cyan-300' : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'}`}>{anim === 'none' ? '無特效' : anim === 'fade' ? '淡入' : anim === 'pop' ? '彈出' : anim === 'slideUp' ? '上滑' : '打字機'}</button>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<MobileTechVideoEditor />);
  </script>
</body>
</html>
